  // Fora do Claude.ai não existe "window.storage" — este shim replica a mesma
// interface (get/set/delete), mas gravando de verdade no localStorage do
// navegador, então os dados ficam salvos no computador ou iPhone entre usos.
(function () {
  function key(k, shared) {
    return (shared ? "shared:" : "personal:") + k;
  }
  window.storage = {
    get: function (k, shared) {
      return new Promise(function (resolve, reject) {
        try {
          const raw = localStorage.getItem(key(k, shared));
          if (raw === null) {
            reject(new Error("not found"));
            return;
          }
          resolve({ key: k, value: raw, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
    set: function (k, value, shared) {
      return new Promise(function (resolve, reject) {
        try {
          localStorage.setItem(key(k, shared), value);
          resolve({ key: k, value: value, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
    delete: function (k, shared) {
      return new Promise(function (resolve, reject) {
        try {
          localStorage.removeItem(key(k, shared));
          resolve({ key: k, deleted: true, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
    list: function (prefix, shared) {
      return new Promise(function (resolve, reject) {
        try {
          const pfx = (shared ? "shared:" : "personal:") + (prefix || "");
          const keys = [];
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.indexOf(pfx) === 0) keys.push(k.slice((shared ? 7 : 9)));
          }
          resolve({ keys: keys, prefix: prefix, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
  };
})();

    //  (b) o número vem embutido no início do nome do produto (ex.: "5. Produto") —

function parseWorkbookToData(workbook) {

    }
    const wsExName = workbook.SheetNames.find((n) => n.trim().toLowerCase() === "extra-desc");
    const wsEx = wsExName ? workbook.Sheets[wsExName] : null;
    const dRows = XLSX.utils.sheet_to_json(wsD, { header: 1, defval: null });
    const pRows = XLSX.utils.sheet_to_json(wsP, { header: 1, defval: null });
    const linhaToTiers = {};
    for (let i = 1; i < dRows.length; i++) {
        const row = dRows[i] || [];
        const linha = row[1];
        if (!linha)
            continue;
        const qtRaw = row[2];
        let qtf = parseFloat(String(qtRaw).replace(",", "."));
        if (Number.isNaN(qtf))
            qtf = 0;
        const desconto = asPct(row[3]);
        if (!linhaToTiers[linha])
            linhaToTiers[linha] = [];
        linhaToTiers[linha].push({ qtf, qt: qtRaw, desconto });
    }
    Object.values(linhaToTiers).forEach((arr) => arr.sort((a, b) => a.qtf - b.qtf));
    // Aba "extra-desc" (opcional): Linha -> % de desconto extra, aplicado sobre o preço base
    const linhaToExtra = {};
    if (wsEx) {
        const exRows = XLSX.utils.sheet_to_json(wsEx, { header: 1, defval: null });
        for (let i = 1; i < exRows.length; i++) {
            const row = exRows[i] || [];
            const linha = row[1];
            const pctRaw = row[2];
            if (!linha || pctRaw === null || pctRaw === undefined)
                continue;
            const pct = asPct(pctRaw);
            linhaToExtra[String(linha).trim()] = pct;
        }
    }
    const data = {};
    let produtosSemPreco = 0;
    for (let i = 1; i < pRows.length; i++) {
        const row = pRows[i] || [];
        const id = row[0];
        const linha = row[1];
        const nome = row[2];
        const preco = typeof row[3] === "number" ? row[3] : parseFloat(row[3]);
        const imagem = row[4] || null;
        if (id == null && nome == null)
            continue;
        if (nome == null)
            continue;
        if (Number.isNaN(preco)) {
            produtosSemPreco++;
            continue;
        }
        const tiersSrc = linhaToTiers[linha] || [];
        let tiers = tiersSrc.length === 0
            ? [{ qt: 0, desconto: 0, preco: round4(preco) }]
            : tiersSrc.map((t) => ({
                qt: t.qt,
                desconto: round4(t.desconto || 0),
                preco: round4(preco * (1 - (t.desconto || 0) / 100)),
            }));
        // Faixas com código especial (ex.: "904.4-5") sempre vão para o final da lista
        tiers = [...tiers.filter((t) => typeof t.qt === "number"), ...tiers.filter((t) => typeof t.qt !== "number")];
        const descExtra = linha != null ? linhaToExtra[String(linha).trim()] : undefined;
        data[nome] = {
            id,
            linha,
            preco_base: round4(preco),
            imagem,
            tiers,
            descExtra: descExtra !== undefined ? descExtra : null,
        };
    }

        throw new Error("Nenhum produto válido foi encontrado na aba Produtos.");
    }
    return { data, produtosSemPreco };
}

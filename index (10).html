<style>
:root{
  --bg:#F7F5F0; --surface:#FFFFFF; --surface-2:#F0EDE4;
  --border:#E4E1D8; --border-strong:#CFCBBD;
  --text:#1A1D21; --text-2:#5B6572; --text-muted:#8A8F98;
  --brand:#2B4570; --brand-ink:#1B2C47; --brand-tint:#E8ECF3;
  --accent:#E08E2B; --accent-ink:#7A4B0F; --accent-tint:#FBEDD9;
  --good:#3F8F5F; --good-tint:#E4F2E9; --good-ink:#255C3C;
  --bad:#C0463C; --bad-tint:#FBE7E5; --bad-ink:#7E2C25;
  --radius:10px; --radius-lg:16px;
  --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'IBM Plex Mono',monospace;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#14181C; --surface:#1C2126; --surface-2:#232A31;
    --border:#2A3138; --border-strong:#3A434C;
    --text:#F2F1EC; --text-2:#A8B0B8; --text-muted:#767F88;
    --brand:#5B7FB0; --brand-ink:#DCE6F2; --brand-tint:#20293A;
    --accent:#E8A64E; --accent-ink:#F5D9AC; --accent-tint:#3A2C15;
    --good:#5FB582; --good-tint:#16281E; --good-ink:#8FD1AA;
    --bad:#E17169; --bad-tint:#301917; --bad-ink:#F0A79F;
  }
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;}
h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0;}
.num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
button,select{font-family:var(--font-body);}

#shell{min-height:100vh;}

/* Topbar */
#topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:20;}
.hamburger-btn{background:transparent;border:1px solid var(--border-strong);border-radius:8px;width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);}
.hamburger-btn:hover{background:var(--surface-2);}
.hamburger-btn svg{width:18px;height:18px;}
.topbar-title{font-family:var(--font-display);font-weight:600;font-size:15.5px;color:var(--brand);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-badge{margin-left:auto;font-size:11.5px;background:var(--brand-tint);color:var(--brand-ink);padding:5px 11px;border-radius:20px;white-space:nowrap;flex-shrink:0;}

/* Drawer */
#drawer-overlay{position:fixed;inset:0;background:rgba(10,12,14,.45);opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:30;}
#drawer-overlay.open{opacity:1;pointer-events:auto;}
#drawer{position:fixed;top:0;left:0;bottom:0;width:260px;max-width:82vw;background:var(--surface);border-right:0.5px solid var(--border);transform:translateX(-100%);transition:transform .25s ease;z-index:31;padding:18px 0;overflow-y:auto;}
#drawer.open{transform:translateX(0);}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:0 18px 16px;border-bottom:0.5px solid var(--border);margin-bottom:10px;}
.drawer-head span{font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--brand);}
.drawer-close{background:transparent;border:none;font-size:20px;line-height:1;color:var(--text-muted);cursor:pointer;padding:4px;}
.navlist{display:flex;flex-direction:column;gap:2px;padding:0 10px;}
.navitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;border-left:3px solid transparent;color:var(--text-2);font-size:13.5px;font-weight:500;transition:background .12s;}
.navitem:hover{background:var(--surface-2);}
.navitem.active{background:var(--brand-tint);color:var(--brand-ink);border-left:3px solid var(--accent);}
.navitem .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0;}
.navitem.home{margin-bottom:8px;padding-bottom:12px;border-bottom:0.5px solid var(--border);border-radius:0;}

/* Landing */
#landing{min-height:100vh;display:flex;align-items:center;padding:8vh 8vw;}
.landing-inner{max-width:640px;}
.eyebrow{font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent-tint);display:inline-block;padding:5px 12px;border-radius:20px;margin-bottom:20px;animation:fadeUp .5s ease both;}
.landing-title{font-size:clamp(38px,7vw,64px);line-height:1.02;font-weight:600;color:var(--text);margin-bottom:18px;animation:fadeUp .5s ease .05s both;}
.landing-title em{font-style:normal;color:var(--brand);}
.swatchstrip{display:flex;gap:6px;margin-bottom:22px;animation:fadeUp .5s ease .1s both;}
.swatchstrip span{width:34px;height:10px;border-radius:3px;display:inline-block;}
.sw1{background:var(--brand);} .sw2{background:var(--accent);} .sw3{background:var(--good);} .sw4{background:var(--bad);} .sw5{background:var(--border-strong);}
.landing-sub{font-size:16px;color:var(--text-2);max-width:480px;margin-bottom:32px;animation:fadeUp .5s ease .15s both;}
.landing-stats{display:flex;gap:32px;flex-wrap:wrap;margin-bottom:36px;animation:fadeUp .5s ease .2s both;}
.landing-stat .val{font-family:var(--font-voice,var(--font-display));font-size:32px;font-weight:600;color:var(--text);}
.landing-stat .lbl{font-size:12.5px;color:var(--text-muted);margin-top:2px;}
.cta-btn{background:var(--brand);color:#fff;border:none;border-radius:10px;padding:14px 24px;font-size:14.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:8px;animation:fadeUp .5s ease .25s both;transition:transform .15s ease, opacity .15s ease;}
.cta-btn:hover{opacity:.92;}
.cta-btn:active{transform:scale(.98);}
.cta-arrow{transition:transform .15s ease;}
.cta-btn:hover .cta-arrow{transform:translateX(3px);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion:reduce){.eyebrow,.landing-title,.swatchstrip,.landing-sub,.landing-stats,.cta-btn{animation:none;}}
@media (max-width:520px){#landing{padding:10vh 6vw;} .landing-stats{gap:22px;}}

/* Main */
#main{padding:20px 20px 60px;max-width:1180px;margin:0 auto;}
#filterbar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:22px;}
.fgroup{display:flex;flex-direction:column;gap:4px;}
.fgroup label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;}
select{background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;min-width:130px;}
select:focus{outline:2px solid var(--accent);outline-offset:1px;}
.fresetbtn{margin-left:auto;background:transparent;border:1px solid var(--border-strong);border-radius:8px;padding:8px 14px;color:var(--text-2);font-size:12.5px;cursor:pointer;height:34px;}
.fresetbtn:hover{background:var(--surface-2);}

.msdrop{position:relative;}
.msdrop-btn{background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;min-width:130px;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.msdrop-btn:after{content:'▾';font-size:9px;color:var(--text-muted);}
.msdrop-btn:hover{background:var(--surface-2);}
.msdrop-btn:focus{outline:2px solid var(--accent);outline-offset:1px;}
.msdrop-panel{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:8px;min-width:190px;max-height:280px;overflow-y:auto;z-index:40;display:none;}
.msdrop-panel.open{display:block;}
.msdrop-actions{display:flex;justify-content:space-between;padding:2px 4px 8px;border-bottom:0.5px solid var(--border);margin-bottom:6px;}
.msdrop-actions button{background:transparent;border:none;color:var(--brand);font-size:11.5px;cursor:pointer;padding:2px 4px;}
.msdrop-actions button:hover{text-decoration:underline;}
.msdrop-opt{display:flex;align-items:center;gap:8px;padding:6px;border-radius:6px;font-size:13px;cursor:pointer;}
.msdrop-opt:hover{background:var(--surface-2);}
.msdrop-opt input{width:14px;height:14px;flex-shrink:0;}

.panel-title{margin-bottom:4px;font-size:20px;}
.panel-sub{color:var(--text-2);font-size:13px;margin:0 0 20px;}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px;}
.kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;}
.kpi .lbl{font-size:12px;color:var(--text-muted);margin-bottom:6px;}
.kpi .val{font-size:26px;font-weight:500;}
.kpi .delta{font-size:12.5px;margin-top:4px;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;}
.delta.up{background:var(--good-tint);color:var(--good-ink);}
.delta.down{background:var(--bad-tint);color:var(--bad-ink);}
.delta.flat{background:var(--surface-2);color:var(--text-2);}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:20px;}
.card h3{font-size:14px;margin-bottom:14px;color:var(--text);}
.chartwrap{position:relative;width:100%;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);font-weight:500;padding:8px 10px;border-bottom:1px solid var(--border);}
td{padding:9px 10px;border-bottom:0.5px solid var(--border);}
tr:last-child td{border-bottom:none;}
td.num,th.num{text-align:right;font-family:var(--font-mono);}
.rankbadge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-size:11px;font-family:var(--font-mono);margin-right:8px;background:var(--surface-2);color:var(--text-2);}
.classA{background:var(--accent-tint);color:var(--accent-ink);}
.classB{background:var(--brand-tint);color:var(--brand-ink);}
.classC{background:var(--surface-2);color:var(--text-muted);}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:500;}

.empty{padding:40px 20px;text-align:center;color:var(--text-muted);}
.empty i{font-size:26px;display:block;margin-bottom:8px;}

.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
@media (max-width:900px){.grid2{grid-template-columns:1fr;}}

.metainput{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.metainput input[type=number]{background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:8px 10px;font-family:var(--font-mono);font-size:14px;width:160px;color:var(--text);}
.savebtn{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;}
.savebtn:hover{opacity:.9;}
.savedtag{font-size:12px;color:var(--good-ink);opacity:0;transition:opacity .3s;}
.savedtag.show{opacity:1;}

.legend{display:flex;gap:16px;font-size:12px;color:var(--text-2);margin-top:8px;flex-wrap:wrap;}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.sw{width:10px;height:10px;border-radius:2px;display:inline-block;}

.infogrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.infoitem{background:var(--surface-2);border-radius:8px;padding:12px 14px;}
.infoitem .k{font-size:11px;color:var(--text-muted);}
.infoitem .v{font-size:16px;font-family:var(--font-mono);margin-top:2px;}

/* Dashboard compacto (1 folha) */
.dash-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.dash-printbtn{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.dash-printbtn:hover{opacity:.9;}
.dkpis{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;}
.dkpi{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;}
.dkpi .lbl{font-size:10.5px;color:var(--text-muted);margin-bottom:3px;line-height:1.2;}
.dkpi .val{font-size:19px;font-weight:500;}
.dkpi .delta{font-size:11px;margin-top:2px;display:inline-flex;padding:1px 7px;border-radius:20px;}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.dcard{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;}
.dcard h4{font-size:12.5px;font-weight:600;font-family:var(--font-display);margin:0 0 8px;color:var(--text-2);}
.dlist{display:flex;flex-direction:column;gap:6px;}
.dlist-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.dlist-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.dlist-bar{height:6px;border-radius:3px;background:var(--surface-2);flex:1.4;position:relative;overflow:hidden;}
.dlist-bar i{position:absolute;left:0;top:0;bottom:0;background:var(--brand);border-radius:3px;}
.dlist-val{font-family:var(--font-mono);font-size:11.5px;color:var(--text-2);width:64px;text-align:right;flex-shrink:0;}
.dgauge-wrap{display:flex;align-items:center;gap:16px;}
.dgauge-track{flex:1;height:14px;border-radius:8px;background:var(--surface-2);position:relative;overflow:hidden;}
.dgauge-fill{position:absolute;left:0;top:0;bottom:0;border-radius:8px;background:var(--brand);}
.dgauge-fill.over{background:var(--good);}
.dgauge-label{font-family:var(--font-mono);font-size:13px;white-space:nowrap;}
@media (max-width:760px){.dkpis{grid-template-columns:repeat(2,1fr);} .dash-row{grid-template-columns:1fr;}}

@media print{
  #topbar,#drawer,#drawer-overlay,#filterbar,.dash-printbtn,#landing{display:none !important;}
  body{background:#fff;}
  #shell{display:block !important;}
  #main{padding:0;max-width:100%;}
  .card,.dcard{break-inside:avoid;border-color:#ccc;}
  .dash-head{margin-bottom:8px;}
}

::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}
</style>
</head>

<script>
const SEED = JSON.parse(document.getElementById('raw-data').textContent);
let RAW = SEED;
const STORAGE_KEY = 'dataset';
const MONTH_SHORT = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MONTH_FULL = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const TABS = [
  {id:'dashboard', label:'Dashboard (1 folha)'},
  {id:'geral', label:'Visão geral'},
  {id:'anual', label:'Comparativo anual'},
  {id:'cliente', label:'Análise por cliente'},
  {id:'regiao', label:'Análise por região'},
  {id:'diaria', label:'Análise diária'},
  {id:'metas', label:'Metas e realizado'},
  {id:'bd', label:'Atualização do BD'}
];

let maxAno = Math.max(...RAW.map(r=>r.an));
function recomputeMaxAno(){ maxAno = RAW.length ? Math.max(...RAW.map(r=>r.an)) : new Date().getFullYear(); }

const state = {
  tab:'dashboard',
  area:'220',
  ano:String(maxAno),
  mes:[], // array de meses selecionados; vazio ou com os 12 = todos os meses
  mesPanelOpen:false,
  municipio:'todos',
  cliente:'todos'
};

const charts = {};
function killChart(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }

function fmtNum(n){ return Math.round(n).toLocaleString('pt-BR'); }
function fmtPct(n){ if(!isFinite(n)) return '—'; const s = n>=0?'+':''; return s + n.toFixed(1).replace('.',',') + '%'; }
function isDark(){ return matchMedia('(prefers-color-scheme: dark)').matches; }
function seriesColor(){ return isDark() ? '#5B7FB0' : '#2B4570'; }
function accentColor(){ return isDark() ? '#E8A64E' : '#E08E2B'; }
function gridColor(){ return isDark() ? '#2A3138' : '#E4E1D8'; }
function tickColor(){ return isDark() ? '#A8B0B8' : '#5B6572'; }

// ---------- filtering ----------
function baseFilter(opts){
  opts = opts || {};
  return RAW.filter(r=>{
    if(state.area!=='todas' && String(r.a)!==state.area) return false;
    if(opts.municipio!==false && state.municipio!=='todos' && r.m!==state.municipio) return false;
    if(opts.cliente!==false && state.cliente!=='todos' && r.n!==state.cliente) return false;
    if(opts.ano!==false && state.ano!=='todos' && r.an!==Number(state.ano)) return false;
    if(opts.mes!==false){
      const arr = Array.isArray(state.mes) ? state.mes : [];
      if(arr.length>0 && arr.length<12 && !arr.includes(r.me)) return false;
    }
    return true;
  });
}

function sum(arr){ return arr.reduce((s,r)=>s+r.q,0); }

// ---------- init ----------
function uniqueSorted(field){ return [...new Set(RAW.map(r=>r[field]))].sort((a,b)=>String(a).localeCompare(String(b),'pt-BR')); }

function buildNav(){
  const nav = document.getElementById('navlist');
  const homeItem = `<div class="navitem home" data-home="1"><span class="dot"></span>Página inicial</div>`;
  nav.innerHTML = homeItem + TABS.map(t=>`<div class="navitem ${t.id===state.tab?'active':''}" data-tab="${t.id}"><span class="dot"></span>${t.label}</div>`).join('');
  nav.querySelectorAll('.navitem[data-tab]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.tab = el.dataset.tab; closeDrawer(); render(); });
  });
  const home = nav.querySelector('.navitem[data-home]');
  if(home) home.addEventListener('click', ()=>{ closeDrawer(); showLanding(); });
}

function mesLabel(){
  const arr = Array.isArray(state.mes) ? state.mes : [];
  if(arr.length===0 || arr.length===12) return 'Todos os meses';
  if(arr.length===1) return MONTH_FULL[arr[0]];
  return arr.length + ' meses';
}

function wireMesDropdown(){
  const dropdown = document.getElementById('mes-dropdown');
  const btn = document.getElementById('mes-btn');
  const panel = document.getElementById('mes-panel');
  if(!dropdown) return;
  if(state.mesPanelOpen) panel.classList.add('open');
  btn.addEventListener('click', e=>{
    e.stopPropagation();
    state.mesPanelOpen = !state.mesPanelOpen;
    panel.classList.toggle('open', state.mesPanelOpen);
  });
  panel.addEventListener('click', e=> e.stopPropagation());
  document.getElementById('mes-all').addEventListener('click', ()=>{ state.mes=MONTH_FULL.slice(1).map((_,i)=>i+1); state.mesPanelOpen=true; render(); });
  document.getElementById('mes-clear').addEventListener('click', ()=>{ state.mes=[]; state.mesPanelOpen=true; render(); });
  document.querySelectorAll('.mes-opt').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const val = Number(cb.value);
      let arr = Array.isArray(state.mes) ? [...state.mes] : [];
      if(arr.length===0 || arr.length===12){
        // partindo de "todos": marcar/desmarcar passa a valer como seleção específica
        arr = cb.checked ? [val] : MONTH_FULL.slice(1).map((_,i)=>i+1).filter(v=>v!==val);
      } else if(cb.checked){
        if(!arr.includes(val)) arr.push(val);
      } else {
        arr = arr.filter(v=>v!==val);
      }
      state.mes = arr;
      state.mesPanelOpen = true;
      render();
    });
  });
}

function buildFilterBar(){
  const anos = [...new Set(RAW.map(r=>r.an))].sort((a,b)=>b-a);
  const municipios = uniqueSorted('m');
  const clientesPool = RAW.filter(r=> state.area==='todas' || String(r.a)===state.area);
  const clientes = [...new Set(clientesPool.map(r=>r.n))].sort((a,b)=>a.localeCompare(b,'pt-BR'));

  const bar = document.getElementById('filterbar');
  bar.innerHTML = `
    <div class="fgroup"><label>Área</label>
      <select id="f-area">
        <option value="220" ${state.area==='220'?'selected':''}>220</option>
        <option value="207" ${state.area==='207'?'selected':''}>207</option>
        <option value="todas" ${state.area==='todas'?'selected':''}>Todas</option>
      </select>
    </div>
    <div class="fgroup"><label>Ano</label>
      <select id="f-ano">
        <option value="todos" ${state.ano==='todos'?'selected':''}>Todos</option>
        ${anos.map(a=>`<option value="${a}" ${String(a)===state.ano?'selected':''}>${a}</option>`).join('')}
      </select>
    </div>
    <div class="fgroup"><label>Mês</label>
      <div class="msdrop" id="mes-dropdown">
        <button type="button" class="msdrop-btn" id="mes-btn">${mesLabel()}</button>
        <div class="msdrop-panel" id="mes-panel">
          <div class="msdrop-actions">
            <button type="button" id="mes-all">Marcar todos</button>
            <button type="button" id="mes-clear">Limpar</button>
          </div>
          ${MONTH_FULL.slice(1).map((m,i)=>`<label class="msdrop-opt"><input type="checkbox" class="mes-opt" value="${i+1}" ${Array.isArray(state.mes)&&state.mes.includes(i+1)?'checked':''}> ${m}</label>`).join('')}
        </div>
      </div>
    </div>
    <div class="fgroup"><label>Município</label>
      <select id="f-municipio">
        <option value="todos" ${state.municipio==='todos'?'selected':''}>Todos</option>
        ${municipios.map(m=>`<option value="${m}" ${m===state.municipio?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>
    <div class="fgroup"><label>Cliente</label>
      <select id="f-cliente">
        <option value="todos" ${state.cliente==='todos'?'selected':''}>Todos</option>
        ${clientes.map(c=>`<option value="${c.replace(/"/g,'&quot;')}" ${c===state.cliente?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <button class="fresetbtn" id="f-reset">Limpar filtros</button>

// ============ VISÃO GERAL ============
// Mês de corte para comparações "do início do ano até agora": usa o último mês
// com dados lançados no ano mais recente da base; se não houver nada ainda nesse
// ano, cai para o mês corrente do calendário.
function getCorteMes(base){
  const dRef = base.filter(r=>r.an===maxAno);
  if(dRef.length) return Math.max(...dRef.map(r=>r.me));
  return new Date().getMonth()+1;
}

function geralCompute(){
  const base = baseFilter({ano:false, mes:false});
  const anoAtual = state.ano!=='todos' ? Number(state.ano) : maxAno;
  const anoAnterior = anoAtual - 1;
  const dAtual = base.filter(r=>r.an===anoAtual);
  const dAnterior = base.filter(r=>r.an===anoAnterior);
  const lastMonth = dAtual.length ? Math.max(...dAtual.map(r=>r.me)) : 0;
  const ytdAtual = sum(dAtual.filter(r=>r.me<=lastMonth));
  const ytdAnterior = sum(dAnterior.filter(r=>r.me<=lastMonth));
  const varYTD = ytdAnterior>0 ? (ytdAtual/ytdAnterior-1)*100 : NaN;
  const totalAnteriorCompleto = sum(dAnterior);
  const clientesAtivos = new Set(dAtual.map(r=>r.n)).size;
  const monthlyAtual = Array(13).fill(0), monthlyAnterior = Array(13).fill(0);
  dAtual.forEach(r=> monthlyAtual[r.me]+=r.q);
  dAnterior.forEach(r=> monthlyAnterior[r.me]+=r.q);
  return {anoAtual, anoAnterior, lastMonth, ytdAtual, ytdAnterior, varYTD, totalAnteriorCompleto, clientesAtivos, monthlyAtual, monthlyAnterior};
}

  return dAno.length ? Math.max(...dAno.map(r=>r.me)) : null;
}

// ============ CAMADA DE ARMAZENAMENTO (Claude artifact OU navegador comum) ============
// window.storage só existe dentro do painel de artifacts do Claude. Fora dele
// (Netlify, servidor próprio, arquivo aberto direto no navegador), usamos
// localStorage do próprio navegador como equivalente.
const hasClaudeStorage = (typeof window!=='undefined') && !!window.storage && typeof window.storage.get==='function';
async function storageGet(key){
  if(hasClaudeStorage){
    try{ const r = await window.storage.get(key); return r ? r.value : null; }catch(e){ return null; }
  }
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
async function storageSet(key, value){
  if(hasClaudeStorage){
    try{ await window.storage.set(key, value); return true; }catch(e){ return false; }
  }
  try{ localStorage.setItem(key, value); return true; }catch(e){ return false; }
}

// ============ METAS E REALIZADO ============
async function loadMeta(key){
  const v = await storageGet(key);
  return v ? Number(v) : 0;
}
async function saveMeta(key, val){
  return await storageSet(key, String(val));
}

  return `

  <div class="metainput">
    <div class="fgroup"><label>Objetivo anual (litros) — ${anoAlvo}</label>
      <input type="number" id="meta-input" min="0" step="100" />

    <div class="chartwrap" style="height:300px;"><canvas id="chart-metas" role="img" aria-label="Meta versus realizado por mes"></canvas></div>

async function mountMetas(){
  const anoAlvo = state.ano!=='todos' ? Number(state.ano) : maxAno;
  const key = `meta:${anoAlvo}:${state.area}`;
  const input = document.getElementById('meta-input');
  const savedTag = document.getElementById('meta-saved');
  let annualGoal = await loadMeta(key);
  input.value = annualGoal || '';

  document.getElementById('meta-save').addEventListener('click', async ()=>{
    const v = Number(input.value)||0;
    const ok = await saveMeta(key, v);
    if(ok){ savedTag.classList.add('show'); setTimeout(()=>savedTag.classList.remove('show'), 1800); }
    drawMetas(v, document.getElementById('meta-saz').checked);
  });
  document.getElementById('meta-saz').addEventListener('change', (e)=>{
    drawMetas(Number(input.value)||0, e.target.checked);
  });

  drawMetas(annualGoal, true);

  function drawMetas(annualGoal, useSeasonality){
    // Metas consideram só Área + Ano — município e cliente não entram aqui,
    // porque uma meta anual é definida no nível da área, não por cliente/cidade.
    const base = baseFilter({ano:false, mes:false, municipio:false, cliente:false});

    // índice de sazonalidade: média histórica por mês, excluindo o ano-alvo
    const histYears = [...new Set(base.map(r=>r.an))].filter(a=>a!==anoAlvo);
    const monthSums = Array(13).fill(0), monthCounts = Array(13).fill(0);
    histYears.forEach(y=>{
      for(let m=1;m<=12;m++){
        const v = sum(base.filter(r=>r.an===y && r.me===m));
        if(v>0){ monthSums[m]+=v; monthCounts[m]+=1; }
      }
    });
    const monthAvg = [];
    for(let m=1;m<=12;m++) monthAvg[m] = monthCounts[m] ? monthSums[m]/monthCounts[m] : 0;
    const avgAll = monthAvg.slice(1).reduce((a,b)=>a+b,0)/12 || 1;
    const seasIdx = []; for(let m=1;m<=12;m++) seasIdx[m] = avgAll>0 ? monthAvg[m]/avgAll : 1;
    const seasIdxSum = seasIdx.slice(1).reduce((a,b)=>a+b,0) || 12;

    const goalMonth = [];
    for(let m=1;m<=12;m++){
      goalMonth[m] = useSeasonality ? annualGoal * (seasIdx[m]/seasIdxSum) : annualGoal/12;
    }

    const dAno = base.filter(r=>r.an===anoAlvo);
    const realizedMonth = Array(13).fill(0);
    dAno.forEach(r=> realizedMonth[r.me]+=r.q);
    const lastMonth = dAno.length ? Math.max(...dAno.map(r=>r.me)) : 0; // último mês já lançado
    const mesCorrente = lastMonth + 1; // mês em andamento, ainda sem lançamento

    // ano anterior, para comparação (mesma ideia: acumulado até o mês anterior)
    const anoAnt = anoAlvo - 1;
    const dAnoAnt = base.filter(r=>r.an===anoAnt);
    const realizedMonthAnt = Array(13).fill(0);
    dAnoAnt.forEach(r=> realizedMonthAnt[r.me]+=r.q);

    const realizadoAcum = realizedMonth.slice(1,lastMonth+1).reduce((a,b)=>a+b,0);
    const metaAcumFechada = goalMonth.slice(1,lastMonth+1).reduce((a,b)=>a+b,0);
    const pctAtingido = metaAcumFechada>0 ? (realizadoAcum/metaAcumFechada*100) : NaN;
    const metaMesCorrente = (mesCorrente<=12) ? goalMonth[mesCorrente] : null;

    const kpiCls = pctAtingido>=100?'up': pctAtingido>=90?'flat':'down';
    document.getElementById('metas-kpis').innerHTML = annualGoal>0 ? `
      <div class="kpi"><div class="lbl">Meta anual</div><div class="val num">${fmtNum(annualGoal)} L</div></div>
      <div class="kpi"><div class="lbl">Realizado até ${lastMonth?MONTH_SHORT[lastMonth]:'—'}</div><div class="val num">${fmtNum(realizadoAcum)} L</div></div>
      <div class="kpi"><div class="lbl">Meta acumulada até ${lastMonth?MONTH_SHORT[lastMonth]:'—'}</div><div class="val num">${fmtNum(metaAcumFechada)} L</div><span class="delta ${kpiCls}">${isFinite(pctAtingido)?pctAtingido.toFixed(0)+'% atingido':'—'}</span></div>
      <div class="kpi"><div class="lbl">Meta para vender em ${mesCorrente<=12?MONTH_SHORT[mesCorrente]:'—'}</div><div class="val num">${metaMesCorrente==null?'Ano completo':fmtNum(metaMesCorrente)+' L'}</div></div>
    ` : `<div class="empty">Informe o objetivo anual acima para calcular as metas mensais.</div>`;

    killChart('chart-metas');
    charts['chart-metas'] = new Chart(document.getElementById('chart-metas'), {
      type:'bar',
      data:{ labels: MONTH_SHORT.slice(1), datasets:[
        {label:'Meta', data: goalMonth.slice(1).map(v=>Math.round(v)), backgroundColor: isDark()?'#3A434C':'#CFCBBD', borderRadius:4, maxBarThickness:26},
        {label:'Realizado', data: realizedMonth.slice(1,13).map((v,i)=> (i+1<=lastMonth ? v : null)), backgroundColor: seriesColor(), borderRadius:4, maxBarThickness:26}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{ y:{beginAtZero:true, grid:{color:gridColor()}, ticks:{color:tickColor()}},
                 x:{grid:{display:false}, ticks:{color:tickColor()}} } }
    });

    const rows = [];
    for(let m=1;m<=12;m++){
      const r = m<=lastMonth ? realizedMonth[m] : null;
      const varr = (r!=null && goalMonth[m]>0) ? (r/goalMonth[m]-1)*100 : null;
      const cls = varr==null?'flat':(varr>=0?'up':'down');
      const destaque = (m===mesCorrente) ? ' style="background:var(--accent-tint);"' : '';

      // acumulado sempre até o mês ANTERIOR a este (m-1), para ano atual e ano passado
      const metaAcumAnt = goalMonth.slice(1,m).reduce((a,b)=>a+b,0);
      const realAcumAnt = realizedMonth.slice(1,m).reduce((a,b)=>a+b,0);
      const prevAcumAnt = realizedMonthAnt.slice(1,m).reduce((a,b)=>a+b,0);
      const varAnoAnt = prevAcumAnt>0 ? (realAcumAnt/prevAcumAnt-1)*100 : null;
      const clsAno = varAnoAnt==null?'flat':(varAnoAnt>=0?'up':'down');

      rows.push(`<tr${destaque}>
        <td>${MONTH_FULL[m]}</td>
        <td class="num">${fmtNum(goalMonth[m])} L</td>
        <td class="num">${r==null?'—':fmtNum(r)+' L'}</td>
        <td class="num">${varr==null?'—':`<span class="pill delta ${cls}">${fmtPct(varr)}</span>`}</td>
        <td class="num">${fmtNum(metaAcumAnt)} L</td>
        <td class="num">${fmtNum(realAcumAnt)} L</td>
        <td class="num">${fmtNum(prevAcumAnt)} L</td>
        <td class="num">${varAnoAnt==null?'—':`<span class="pill delta ${clsAno}">${fmtPct(varAnoAnt)}</span>`}</td>
      </tr>`);
    }
    document.getElementById('metas-table').innerHTML = `
      <p style="font-size:12px;color:var(--text-muted);margin:0 0 10px;">As colunas "acumulado" somam sempre até o mês <strong>anterior</strong> ao da linha — ex: na linha de Julho, mostram o total de Jan a Jun.</p>
      <div style="overflow-x:auto;">
      <table><thead><tr>
        <th>Mês</th><th class="num">Meta do mês</th><th class="num">Realizado do mês</th><th class="num">Var. do mês</th>
        <th class="num">Meta acum. (até mês ant.)</th><th class="num">Realizado acum. (até mês ant.)</th>
        <th class="num">${anoAnt} acum. (até mês ant.)</th><th class="num">Var. vs ${anoAnt}</th>
      </tr></thead><tbody>${rows.join('')}</tbody></table>
      </div>`;
  }
}

// ============ PERSISTÊNCIA DA BASE DE DADOS ============
async function loadRAWFromStorage(){
  try{
    const v = await storageGet(STORAGE_KEY);
    if(v){
      const parsed = JSON.parse(v);
      if(Array.isArray(parsed) && parsed.length) return parsed;
    }
  }catch(e){ /* nada salvo ainda, ou storage indisponível */ }
  return null;
}
async function persistRAW(){
  return await storageSet(STORAGE_KEY, JSON.stringify(RAW));
}
async function resetToSeed(){
  RAW = JSON.parse(JSON.stringify(SEED));
  recomputeMaxAno();
  await persistRAW();
}

// ============ IMPORTAÇÃO DE DADOS COLADOS DO EXCEL ============
function normalizeHeader(h){
  return h.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_');
}
function parseNumberPt(s){
  if(s==null) return NaN;
  s = String(s).trim();
  if(s==='') return NaN;
  if(s.indexOf(',')>-1 && s.indexOf('.')>-1) s = s.replace(/\./g,'').replace(',', '.');
  else if(s.indexOf(',')>-1) s = s.replace(',', '.');
  return Number(s);
}
function parseDateFlexible(s){
  if(!s) return null;
  s = String(s).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  return null;
}
function parsePastedTSV(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim()!=='');
  if(lines.length<2) throw new Error('Cole o cabeçalho e pelo menos uma linha de dados.');
  const headers = lines[0].split('\t').map(normalizeHeader);
  const idx = {}; headers.forEach((h,i)=>{ idx[h]=i; });
  const colNome = idx['nome'], colMun = idx['municipio'], colArea = idx['area'], colQuarto = idx['quarto'],
        colDia = idx['dia'], colAno = idx['ano'], colMes = idx['mes_num'];
  const found = headers.filter(h=>h).join(', ') || '(nenhuma — confira se a linha colada tem tabulações entre as colunas)';
  if(colNome===undefined || colMun===undefined || colQuarto===undefined)
    throw new Error(`Faltam colunas obrigatórias (Nome, Municipio ou Quarto). Cabeçalho que eu li: ${found}.`);
  if(colDia===undefined && (colAno===undefined || colMes===undefined))
    throw new Error(`Preciso da coluna Dia, ou de Ano + Mês_Num, pra saber o período. Cabeçalho que eu li: ${found}.`);
  const out = [];
  let skippedNomeOuMun=0, skippedQuarto=0, skippedPeriodo=0;
  for(let i=1;i<lines.length;i++){
    const cells = lines[i].split('\t');
    const n = (cells[colNome]||'').replace(/\u00a0/g,' ').trim();
    const m = (cells[colMun]||'').replace(/\u00a0/g,' ').trim();
    if(!n || !m){ skippedNomeOuMun++; continue; }
    const q = parseNumberPt(cells[colQuarto]);
    if(!isFinite(q)){ skippedQuarto++; continue; }
    const a = colArea!==undefined ? parseInt(cells[colArea],10) : Number(state.area==='todas'?220:state.area);
    let d = colDia!==undefined ? parseDateFlexible(cells[colDia]) : null;
    let an = colAno!==undefined ? parseInt(cells[colAno],10) : null;
    let me = colMes!==undefined ? parseInt(cells[colMes],10) : null;
    if(d && (!an || !me)){ const [yy,mm] = d.split('-'); an = an || Number(yy); me = me || Number(mm); }
    if(!d && an && me) d = `${an}-${String(me).padStart(2,'0')}-01`;
    if(!an || !me || !d){ skippedPeriodo++; continue; }
    out.push({n, m, a: isFinite(a)?a:220, an, me, d, q});
  }
  if(!out.length){
    const motivos = [];
    if(skippedNomeOuMun) motivos.push(`${skippedNomeOuMun} sem nome/município`);
    if(skippedQuarto) motivos.push(`${skippedQuarto} com Quarto inválido`);
    if(skippedPeriodo) motivos.push(`${skippedPeriodo} sem data/ano/mês reconhecidos (confira o formato da coluna Dia)`);
    throw new Error(`Nenhuma linha válida encontrada. Cabeçalho lido: ${found}.${motivos.length? ' Linhas descartadas: '+motivos.join('; ')+'.' : ''}`);
  }
  return out;
}
async function importRecords(newRecords){
  const keyOf = r => r.n+'|'+r.an+'|'+r.me;
  const map = new Map();
  RAW.forEach(r=> map.set(keyOf(r), r));
  let inserted=0, updated=0;
  newRecords.forEach(r=>{ const k=keyOf(r); if(map.has(k)) updated++; else inserted++; map.set(k, r); });
  RAW = Array.from(map.values());
  recomputeMaxAno();
  await persistRAW();
  return {inserted, updated, total: RAW.length};
}
async function exportBackup(){
  const filename = 'painel_comercial_backup_' + new Date().toISOString().slice(0,10) + '.json';
  const json = JSON.stringify(RAW);
  try{
    const file = new File([json], filename, {type:'application/json'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'Backup Movimento de Litragem'});
      return;
    }
  }catch(e){ /* cancelado ou sem suporte — cai para o download comum abaixo */ }
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function mountBD(){
  const btn = document.getElementById('import-btn');
  if(!btn) return;
  const textArea = document.getElementById('import-text');
  const preview = document.getElementById('import-preview');
  textArea.addEventListener('input', ()=>{
    const text = textArea.value;
    if(!text.trim()){ preview.textContent=''; return; }
    try{
      const recs = parsePastedTSV(text);
      preview.style.color = 'var(--text-2)';
      const meses = [...new Set(recs.map(r=>`${MONTH_SHORT[r.me]}/${r.an}`))].join(', ');
      preview.textContent = `Pronto pra importar: ${recs.length} linha(s) válida(s) — período detectado: ${meses}.`;
    }catch(err){
      preview.style.color = 'var(--bad-ink)';
      preview.textContent = err.message;
    }
  });
  btn.addEventListener('click', async ()=>{
    const text = document.getElementById('import-text').value;
    const fb = document.getElementById('import-feedback');
    try{
      const recs = parsePastedTSV(text);
      const res = await importRecords(recs);
      fb.style.color = 'var(--good-ink)';
      fb.textContent = `${res.inserted} registro(s) novo(s), ${res.updated} atualizado(s). Total na base: ${res.total}. Atualizando o painel…`;
      preview.textContent='';
      document.getElementById('import-text').value='';
      setTimeout(render, 1600);
    }catch(err){
      fb.style.color = 'var(--bad-ink)';
      fb.textContent = err.message;
    }
  });
  document.getElementById('export-btn').addEventListener('click', exportBackup);
  document.getElementById('import-file-btn').addEventListener('click', ()=>{
    document.getElementById('import-file-input').click();
  });
  document.getElementById('import-file-input').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    const fb = document.getElementById('import-file-feedback');
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (ev)=>{
      const raw = ev.target.result;
      let parsed;
      try{
        parsed = JSON.parse(raw);
      }catch(e){
        fb.style.color = 'var(--bad-ink)';
        fb.textContent = `Não consegui ler como JSON. Início do arquivo: "${String(raw).slice(0,60)}…" — parece que o arquivo não foi salvo corretamente.`;
        return;
      }
      try{
        if(!Array.isArray(parsed) || !parsed.length){
          const tipo = Array.isArray(parsed) ? 'uma lista vazia' : typeof parsed;
          throw new Error(`O arquivo não é uma lista de registros (encontrei ${tipo}). Use o .json baixado pelo botão "Baixar backup" deste painel, sem abrir ou editar antes.`);
        }
        const bad = parsed.find(r=> typeof r.n!=='string' || typeof r.m!=='string' || typeof r.q!=='number' || !r.an || !r.me);
        if(bad) throw new Error('O arquivo tem registros em formato inesperado — use um backup baixado deste mesmo painel.');
        const res = await importRecords(parsed);
        fb.style.color = 'var(--good-ink)';
        fb.textContent = `Backup carregado: ${res.inserted} novo(s), ${res.updated} atualizado(s). Total na base: ${res.total}. Atualizando…`;
        setTimeout(render, 1600);
      }catch(err){
        fb.style.color = 'var(--bad-ink)';
        fb.textContent = err.message;
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
  document.getElementById('reset-btn').addEventListener('click', async ()=>{
    if(confirm('Isso remove os dados importados e volta para a base original carregada na criação do painel. Continuar?')){
      await resetToSeed();
      render();
    }
  });
}

// ============ LANDING ============
function heroStats(data){
  const d220 = data.filter(r=>r.a===220);
  const pool = d220.length ? d220 : data;
  const ano = Math.max(...pool.map(r=>r.an));
  const dAno = pool.filter(r=>r.an===ano);
  return {
    ano,
    volume: sum(dAno),
    clientes: new Set(dAno.map(r=>r.n)).size,
    municipios: new Set(dAno.map(r=>r.m)).size
  };
}
function renderLandingStats(data){
  const h = heroStats(data);
  document.getElementById('landing-stats').innerHTML = `
    <div class="landing-stat"><div class="val num">${fmtNum(h.volume)} L</div><div class="lbl">Volume em ${h.ano}</div></div>
    <div class="landing-stat"><div class="val num">${h.clientes}</div><div class="lbl">Clientes ativos</div></div>
    <div class="landing-stat"><div class="val num">${h.municipios}</div><div class="lbl">Municípios atendidos</div></div>
  `;
}
function showLanding(){
  document.getElementById('shell').style.display='none';
  document.getElementById('landing').style.display='flex';
}
function showApp(){
  document.getElementById('landing').style.display='none';
  document.getElementById('shell').style.display='block';
}

// ============ DRAWER (menu hambúrguer) ============
function openDrawer(){ document.getElementById('drawer').classList.add('open'); document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }
document.getElementById('hamburger-btn').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDrawer(); });
document.addEventListener('click', e=>{
  const dropdown = document.getElementById('mes-dropdown');
  if(dropdown && !dropdown.contains(e.target) && state.mesPanelOpen){
    state.mesPanelOpen = false;
    const panel = document.getElementById('mes-panel');
    if(panel) panel.classList.remove('open');
  }
});

// ============ INICIALIZAÇÃO ============
renderLandingStats(SEED);

const dataReady = (async ()=>{
  const stored = await loadRAWFromStorage();
  if(stored){ RAW = stored; } else { await persistRAW(); }
  recomputeMaxAno();
  state.ano = String(maxAno);
  renderLandingStats(RAW);
})();

document.getElementById('cta-btn').addEventListener('click', async ()=>{
  await dataReady;
  showApp();
  render();
});
</script>

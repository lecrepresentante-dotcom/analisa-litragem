<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Litragem</title>
<meta name="theme-color" content="#2B4570">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#F7F5F0; --surface:#FFFFFF; --surface-2:#F0EDE4;
  --border:#E4E1D8; --border-strong:#CFCBBD;
  --text:#1A1D21; --text-2:#5B6572; --text-muted:#8A8F98;
  --brand:#2B4570; --brand-ink:#1B2C47; --brand-tint:#E8ECF3;
  --accent:#E08E2B; --accent-ink:#7A4B0F; --accent-tint:#FBEDD9;
  --good:#3F8F5F; --good-tint:#E4F2E9; --good-ink:#255C3C;
  --bad:#C0463C; --bad-tint:#FBE7E5; --bad-ink:#7E2C25;
  --radius:10px; --radius-lg:16px;
  --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'IBM Plex Mono',monospace;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#14181C; --surface:#1C2126; --surface-2:#232A31;
    --border:#2A3138; --border-strong:#3A434C;
    --text:#F2F1EC; --text-2:#A8B0B8; --text-muted:#767F88;
    --brand:#5B7FB0; --brand-ink:#DCE6F2; --brand-tint:#20293A;
    --accent:#E8A64E; --accent-ink:#F5D9AC; --accent-tint:#3A2C15;
    --good:#5FB582; --good-tint:#16281E; --good-ink:#8FD1AA;
    --bad:#E17169; --bad-tint:#301917; --bad-ink:#F0A79F;
  }
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;}
h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0;}
.num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
button,select{font-family:var(--font-body);}
#shell{min-height:100vh;}
#topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:20;}
.hamburger-btn{background:transparent;border:1px solid var(--border-strong);border-radius:8px;width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);}
.hamburger-btn:hover{background:var(--surface-2);}
.hamburger-btn svg{width:18px;height:18px;}
.topbar-title{font-family:var(--font-display);font-weight:600;font-size:15.5px;color:var(--brand);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-badge{margin-left:auto;font-size:11.5px;background:var(--brand-tint);color:var(--brand-ink);padding:5px 11px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
#drawer-overlay{position:fixed;inset:0;background:rgba(10,12,14,.5);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:30;backdrop-filter:blur(1px);}
#drawer-overlay.open{opacity:1;pointer-events:auto;}
#drawer{position:fixed;top:0;left:0;bottom:0;width:280px;max-width:84vw;background:var(--surface);border-right:0.5px solid var(--border);transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:31;display:flex;flex-direction:column;overflow-y:auto;box-shadow:8px 0 32px rgba(20,24,28,.10);}
#drawer.open{transform:translateX(0);}
.drawer-brand{display:flex;align-items:center;gap:12px;padding:20px 18px 16px;}
.drawer-logo-badge{width:38px;height:38px;flex-shrink:0;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand-ink));display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(43,69,112,.35);}
.drawer-logo-badge svg{width:20px;height:20px;color:#fff;}
.drawer-brand-text{flex:1;min-width:0;}
.drawer-brand-name{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--text);line-height:1.2;}
.drawer-brand-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px;}
.drawer-close{background:transparent;border:none;font-size:20px;line-height:1;color:var(--text-muted);cursor:pointer;padding:6px;border-radius:8px;flex-shrink:0;transition:background .15s ease;}
.drawer-close:hover{background:var(--surface-2);}
.drawer-divider{height:0.5px;background:var(--border);margin:0 18px 12px;}
.navlist{display:flex;flex-direction:column;gap:14px;padding:0 12px 14px;flex:1;}
.navgroup{display:flex;flex-direction:column;gap:3px;}
.navgroup-title{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding:0 10px;margin-bottom:4px;}
.navitem{position:relative;overflow:hidden;display:flex;align-items:center;gap:11px;min-height:52px;padding:8px 14px;border-radius:13px;cursor:pointer;color:var(--text-2);font-size:13.8px;font-weight:500;transition:background .18s ease, color .18s ease, transform .12s ease;}
.navitem:hover{background:var(--surface-2);}
.navitem:active{transform:scale(.98);}
.navitem-icon{width:19px;height:19px;flex-shrink:0;color:var(--text-muted);transition:color .18s ease;}
.navitem-icon svg{width:100%;height:100%;}
.navitem-label{flex:1;min-width:0;}
.navitem.active{background:var(--brand-tint);color:var(--brand-ink);font-weight:600;}
.navitem.active .navitem-icon{color:var(--brand);}
.navitem.active::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:3.5px;border-radius:4px;background:var(--accent);}
.ripple-fx{position:absolute;border-radius:50%;background:rgba(120,140,170,.28);transform:scale(0);animation:rippleAnim .5s ease-out forwards;pointer-events:none;}
@keyframes rippleAnim{to{transform:scale(1);opacity:0;}}
.drawer-footer{margin-top:auto;padding:16px 20px 20px;border-top:0.5px solid var(--border);}
.drawer-footer-name{font-family:var(--font-display);font-weight:600;font-size:12.5px;color:var(--text-2);}
.drawer-footer-version{font-size:11px;color:var(--text-muted);margin-top:2px;}
@media (max-width:380px){
  #drawer{width:88vw;}
  .navitem{min-height:50px;font-size:13.3px;}
}
#landing{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6vh 6vw;background:
  radial-gradient(ellipse 60% 45% at 85% 8%, rgba(43,69,112,.08), transparent 60%),
  radial-gradient(ellipse 50% 40% at 5% 95%, rgba(224,142,43,.07), transparent 60%),
  var(--bg);}
.landing-inner{max-width:640px;width:100%;}
.landing-topbar{display:flex;align-items:center;gap:13px;margin-bottom:18px;animation:fadeUp .5s ease both;}
.landing-logo-badge{width:44px;height:44px;flex-shrink:0;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brand-ink));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(43,69,112,.32);}
.landing-logo-badge svg{width:23px;height:23px;color:#fff;}
.landing-brand-name{font-family:var(--font-display);font-weight:600;font-size:19px;color:var(--text);line-height:1.15;}
.landing-brand-sub{font-size:12.5px;color:var(--text-muted);margin-top:1px;}
.landing-tagline{font-size:clamp(19px,3.4vw,25px);line-height:1.32;font-weight:600;color:var(--text);max-width:480px;margin:0 0 26px;animation:fadeUp .5s ease .08s both;}
.landing-tagline em{font-style:normal;color:var(--brand);}

.landing-hero-banner{
  position:relative;overflow:hidden;
  height:clamp(170px,28vh,300px);
  border-radius:22px;margin-bottom:26px;
  background:
    radial-gradient(circle at 14% -12%, rgba(255,255,255,.28), transparent 45%),
    linear-gradient(135deg, var(--brand) 0%, var(--brand-ink) 100%);
  box-shadow:0 14px 34px rgba(27,44,71,.28);
  animation:fadeUp .55s ease .12s both;
}
.hero-eyebrow-pill{
  position:absolute;left:20px;bottom:20px;z-index:2;
  font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:#fff;
  background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
  padding:6px 13px;border-radius:20px;backdrop-filter:blur(2px);
}
.hero-deco{position:absolute;stroke:#fff;fill:none;}
.hero-deco-drop{width:96px;height:96px;top:-18px;right:-14px;opacity:.16;stroke-width:1.4;}
.hero-deco-roller{width:58px;height:58px;bottom:14px;right:22px;opacity:.22;stroke-width:1.6;}
.hero-deco-chart{width:46px;height:46px;top:22px;left:20px;opacity:.24;stroke-width:1.8;}
.hero-deco-trend{width:64px;height:64px;bottom:-10px;left:-8px;opacity:.15;stroke-width:1.4;}
.hero-dot{position:absolute;border-radius:50%;background:#fff;opacity:.35;}

.landing-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.landing-stat-card{
  background:var(--surface);border:0.5px solid var(--border);border-radius:18px;
  padding:16px 14px;box-shadow:0 3px 14px rgba(20,24,28,.06);
  opacity:0;animation:cardIn .5s ease both;
}
.landing-stat-icon{width:30px;height:30px;border-radius:9px;background:var(--brand-tint);color:var(--brand);display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.landing-stat-icon svg{width:16px;height:16px;}
.landing-stat-val{font-family:var(--font-display);font-size:clamp(18px,4vw,22px);font-weight:600;color:var(--text);line-height:1.1;}
.landing-stat-lbl{font-size:11.5px;color:var(--text-muted);margin-top:4px;line-height:1.25;}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}

.cta-btn{
  width:100%;background:linear-gradient(135deg,var(--brand),var(--brand-ink));color:#fff;border:none;
  border-radius:16px;padding:17px 26px;font-size:15.5px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 10px 26px rgba(43,69,112,.35);
  animation:fadeUp .5s ease .3s both;
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(43,69,112,.42);filter:brightness(1.05);}
.cta-btn:active{transform:translateY(0) scale(.98);box-shadow:0 6px 16px rgba(43,69,112,.3);}
.cta-arrow{display:flex;transition:transform .2s ease;}
.cta-arrow svg{width:19px;height:19px;}
.cta-btn:hover .cta-arrow{transform:translateX(4px);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion:reduce){.landing-topbar,.landing-tagline,.landing-hero-banner,.landing-stat-card,.cta-btn{animation:none;opacity:1;}}
@media (max-width:520px){
  #landing{padding:7vh 5vw;}
  .landing-stats-grid{gap:9px;}
  .landing-stat-card{padding:13px 10px;border-radius:15px;}
  .hero-deco-drop{width:74px;height:74px;}
}
#main{padding:20px 20px 60px;max-width:1180px;margin:0 auto;}
#filterbar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
#filterbar-shell{margin-bottom:22px;}
.filterbar-toggle-row{display:flex;justify-content:center;padding:2px 0 6px;}
.filterbar-toggle-btn{
  width:40px;height:40px;flex-shrink:0;border-radius:50%;
  background:var(--surface);border:1px solid var(--border-strong);
  box-shadow:0 2px 8px rgba(20,24,28,.10);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--brand);padding:0;
  transition:box-shadow .2s ease, transform .15s ease, background .2s ease;
}
.filterbar-toggle-btn:hover{box-shadow:0 4px 12px rgba(20,24,28,.16);background:var(--surface-2);}
.filterbar-toggle-btn:active{transform:scale(.93);}
.filterbar-toggle-btn svg{width:18px;height:18px;transition:transform .25s cubic-bezier(.4,0,.2,1);}
.filterbar-toggle-btn.open svg{transform:rotate(180deg);}
.filterbar-panel{
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:max-height .28s cubic-bezier(.4,0,.2,1), opacity .22s ease;
}
.filterbar-panel.open{
  max-height:520px;
  opacity:1;
}
@media (max-width:640px){
  .filterbar-panel.open{max-height:760px;}
}
.fgroup{display:flex;flex-direction:column;gap:4px;}
.fgroup label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;}
select{background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;min-width:130px;}
select:focus{outline:2px solid var(--accent);outline-offset:1px;}
.fresetbtn{margin-left:auto;background:transparent;border:1px solid var(--border-strong);border-radius:8px;padding:8px 14px;color:var(--text-2);font-size:12.5px;cursor:pointer;height:34px;}
.fresetbtn:hover{background:var(--surface-2);}
.msdrop{position:relative;}
.msdrop-btn{background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;min-width:130px;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.msdrop-btn:after{content:'▾';font-size:9px;color:var(--text-muted);}
.msdrop-btn:hover{background:var(--surface-2);}
.msdrop-btn:focus{outline:2px solid var(--accent);outline-offset:1px;}
.msdrop-panel{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:8px;min-width:190px;max-height:280px;overflow-y:auto;z-index:40;display:none;}
.msdrop-panel.open{display:block;}
.msdrop-actions{display:flex;justify-content:space-between;padding:2px 4px 8px;border-bottom:0.5px solid var(--border);margin-bottom:6px;}
.msdrop-actions button{background:transparent;border:none;color:var(--brand);font-size:11.5px;cursor:pointer;padding:2px 4px;}
.msdrop-actions button:hover{text-decoration:underline;}
.msdrop-opt{display:flex;align-items:center;gap:8px;padding:6px;border-radius:6px;font-size:13px;cursor:pointer;}
.msdrop-opt:hover{background:var(--surface-2);}
.msdrop-opt input{width:14px;height:14px;flex-shrink:0;}
.msdrop-opt.cliente-opt{display:block;white-space:normal;word-break:break-word;}
.msdrop-opt.cliente-opt.active{background:var(--brand-tint);color:var(--brand-ink);}
.msdrop-search{width:100%;box-sizing:border-box;padding:7px 8px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px;margin-bottom:6px;}
.msdrop-search:focus{outline:2px solid var(--accent);outline-offset:1px;}
.msdrop-noresults{padding:10px 6px;color:var(--text-muted);font-size:12.5px;}
.msdrop-panel.wide{min-width:260px;max-width:340px;}
.panel-title{margin-bottom:4px;font-size:20px;}
.panel-sub{color:var(--text-2);font-size:13px;margin:0 0 20px;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px;}
.kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;}
.kpi .lbl{font-size:12px;color:var(--text-muted);margin-bottom:6px;}
.kpi .val{font-size:26px;font-weight:500;}
.kpi .delta{font-size:12.5px;margin-top:4px;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;}
.delta.up{background:var(--good-tint);color:var(--good-ink);}
.delta.down{background:var(--bad-tint);color:var(--bad-ink);}
.delta.flat{background:var(--surface-2);color:var(--text-2);}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:20px;}
.card h3{font-size:14px;margin-bottom:14px;color:var(--text);}
.chartwrap{position:relative;width:100%;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);font-weight:500;padding:8px 10px;border-bottom:1px solid var(--border);}
td{padding:9px 10px;border-bottom:0.5px solid var(--border);}
tr:last-child td{border-bottom:none;}
td.num,th.num{text-align:right;font-family:var(--font-mono);}
.rankbadge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-size:11px;font-family:var(--font-mono);margin-right:8px;background:var(--surface-2);color:var(--text-2);}
.classA{background:var(--accent-tint);color:var(--accent-ink);}
.classB{background:var(--brand-tint);color:var(--brand-ink);}
.classC{background:var(--surface-2);color:var(--text-muted);}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:500;}
.empty{padding:40px 20px;text-align:center;color:var(--text-muted);}
.empty i{font-size:26px;display:block;margin-bottom:8px;}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
@media (max-width:900px){.grid2{grid-template-columns:1fr;}}
.metainput{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.metainput input[type=number]{background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:8px 10px;font-family:var(--font-mono);font-size:14px;width:160px;color:var(--text);}
.savebtn{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;}
.savebtn:hover{opacity:.9;}
.savedtag{font-size:12px;color:var(--good-ink);opacity:0;transition:opacity .3s;}
.savedtag.show{opacity:1;}
.legend{display:flex;gap:16px;font-size:12px;color:var(--text-2);margin-top:8px;flex-wrap:wrap;}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.sw{width:10px;height:10px;border-radius:2px;display:inline-block;}
.infogrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.infoitem{background:var(--surface-2);border-radius:8px;padding:12px 14px;}
.infoitem .k{font-size:11px;color:var(--text-muted);}
.infoitem .v{font-size:16px;font-family:var(--font-mono);margin-top:2px;}

.metas-list{display:flex;flex-direction:column;}
.metas-row{display:grid;grid-template-columns:56px 1fr 150px;align-items:center;gap:16px;padding:11px 0;border-bottom:0.5px solid var(--border);}
.metas-row:last-child{border-bottom:none;}
.metas-row.current{background:var(--accent-tint);margin:0 -20px;padding:11px 20px;border-radius:8px;border-bottom-color:transparent;}
.metas-row.future{opacity:.45;}
.metas-month{font-size:13px;font-weight:500;color:var(--text);}
.metas-bar-wrap{position:relative;height:20px;}
.metas-bar-track{position:absolute;inset:0;background:var(--surface-2);border-radius:5px;}
.metas-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:var(--brand);transition:width .3s ease;}
.metas-bar-fill.good{background:var(--good);}
.metas-bar-fill.bad{background:var(--bad);}
.metas-bar-target{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--text);opacity:.55;}
.metas-values{text-align:right;}
.metas-values-main{font-family:var(--font-mono);font-size:12.5px;color:var(--text);white-space:nowrap;}
.metas-values-main .sep{color:var(--text-muted);}
.metas-values-sub{margin-top:3px;display:flex;justify-content:flex-end;gap:5px;flex-wrap:nowrap;}
.metas-legend{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--text-2);margin-bottom:14px;}
.metas-legend span{display:inline-flex;align-items:center;gap:6px;}
.metas-legend i{width:14px;height:2px;background:var(--text);opacity:.55;display:inline-block;}
.metas-legend i.sw{width:10px;height:10px;border-radius:2px;opacity:1;}
.metas-checkpoint{background:var(--surface-2);border-radius:12px;padding:12px 14px;margin:6px 0 10px;}
.metas-checkpoint-title{font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
.metas-checkpoint-row{display:flex;flex-wrap:wrap;gap:10px 18px;font-size:12.5px;color:var(--text-2);margin-bottom:6px;}
.metas-checkpoint-item strong{color:var(--text);font-weight:600;margin-left:4px;}
.metas-checkpoint-note{font-size:12px;color:var(--text-muted);line-height:1.4;}
.adj-tag{font-size:10px;font-weight:600;color:var(--accent-ink);background:var(--accent-tint);padding:1px 7px;border-radius:20px;vertical-align:middle;}
.dash-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.dash-printbtn{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.dash-printbtn:hover{opacity:.9;}
.dkpis{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;}
.dkpi{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;}
.dkpi .lbl{font-size:10.5px;color:var(--text-muted);margin-bottom:3px;line-height:1.2;}
.dkpi .val{font-size:19px;font-weight:500;}
.dkpi .delta{font-size:11px;margin-top:2px;display:inline-flex;padding:1px 7px;border-radius:20px;}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.dcard{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;}
.dcard h4{font-size:12.5px;font-weight:600;font-family:var(--font-display);margin:0 0 8px;color:var(--text-2);}
.dlist{display:flex;flex-direction:column;gap:6px;}
.dlist-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.dlist-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.dlist-bar{height:6px;border-radius:3px;background:var(--surface-2);flex:1.4;position:relative;overflow:hidden;}
.dlist-bar i{position:absolute;left:0;top:0;bottom:0;background:var(--brand);border-radius:3px;}
.dlist-val{font-family:var(--font-mono);font-size:11.5px;color:var(--text-2);width:64px;text-align:right;flex-shrink:0;}
.dgauge-wrap{display:flex;align-items:center;gap:16px;}
.dgauge-track{flex:1;height:14px;border-radius:8px;background:var(--surface-2);position:relative;overflow:hidden;}
.dgauge-fill{position:absolute;left:0;top:0;bottom:0;border-radius:8px;background:var(--brand);}
.dgauge-fill.over{background:var(--good);}
.dgauge-label{font-family:var(--font-mono);font-size:13px;white-space:nowrap;}
@media (max-width:760px){.dkpis{grid-template-columns:repeat(2,1fr);} .dash-row{grid-template-columns:1fr;}}
@media print{
  #topbar,#drawer,#drawer-overlay,#filterbar-shell,.dash-printbtn,#landing{display:none !important;}
  body{background:#fff;}
  #shell{display:block !important;}
  #main{padding:0;max-width:100%;}
  .card,.dcard{break-inside:avoid;border-color:#ccc;}
  .dash-head{margin-bottom:8px;}
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}
</style>
</head>

  span.addEventListener('animationend', ()=> span.remove());
}

function buildNav(){
  const nav = document.getElementById('navlist');
  nav.innerHTML = NAV_GROUPS.map(g=>`
    <div class="navgroup">
      <div class="navgroup-title">${g.title}</div>
      ${g.items.map(t=>{
        const isActive = t.isHome ? false : t.id===state.tab;
        return `<div class="navitem ${isActive?'active':''}" data-tab="${t.id}" ${t.isHome?'data-home="1"':''}>
          <span class="navitem-icon">${icon(t.iconName)}</span>
          <span class="navitem-label">${t.label}</span>
        </div>`;
      }).join('')}
    </div>
  `).join('');
  nav.querySelectorAll('.navitem').forEach(el=>{
    el.addEventListener('click', (ev)=>{
      ripple(el, ev);
      if(el.dataset.home){ closeDrawer(); showLanding(); return; }
      const target = el.dataset.tab;
      if(target !== state.tab){
        state.tab = target;
        state.area = '220';
        state.ano = String(maxAno);
        state.mes = [];
        state.municipio = 'todos';
        state.cliente = 'todos';
        state.mesPanelOpen = false;
        state.clientePanelOpen = false;
      }
      closeDrawer();
      render();
    });
  });
}

function mesLabel(){
  const arr = Array.isArray(state.mes) ? state.mes : [];
  if(arr.length===0 || arr.length===12) return 'Todos os meses';
  if(arr.length===1) return MONTH_FULL[arr[0]];
  return arr.length + ' meses';
}

function wireMesDropdown(){
  const dropdown = document.getElementById('mes-dropdown');
  const btn = document.getElementById('mes-btn');
  const panel = document.getElementById('mes-panel');
  if(!dropdown) return;
  if(state.mesPanelOpen) panel.classList.add('open');
  btn.addEventListener('click', e=>{
    e.stopPropagation();
    state.mesPanelOpen = !state.mesPanelOpen;
    panel.classList.toggle('open', state.mesPanelOpen);
  });
  panel.addEventListener('click', e=> e.stopPropagation());
  document.getElementById('mes-all').addEventListener('click', ()=>{ state.mes=MONTH_FULL.slice(1).map((_,i)=>i+1); state.mesPanelOpen=true; render(); });
  document.getElementById('mes-clear').addEventListener('click', ()=>{ state.mes=[]; state.mesPanelOpen=true; render(); });
  document.querySelectorAll('.mes-opt').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const val = Number(cb.value);
      let arr = Array.isArray(state.mes) ? [...state.mes] : [];
      if(arr.length===0 || arr.length===12){
        arr = cb.checked ? [val] : MONTH_FULL.slice(1).map((_,i)=>i+1).filter(v=>v!==val);
      } else if(cb.checked){
        if(!arr.includes(val)) arr.push(val);
      } else {
        arr = arr.filter(v=>v!==val);
      }
      state.mes = arr;
      state.mesPanelOpen = true;
      render();
    });
  });
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clienteLabel(){
  if(state.cliente==='todos') return 'Todos';
  return state.cliente.length>26 ? state.cliente.slice(0,25)+'…' : state.cliente;
}

function renderClienteOptions(clientes, query){
  const q = (query||'').trim().toLowerCase();
  const filtered = q ? clientes.filter(c=>c.toLowerCase().includes(q)) : clientes;
  const todosRow = `<div class="msdrop-opt cliente-opt ${state.cliente==='todos'?'active':''}" data-val="todos">Todos</div>`;
  if(!filtered.length) return todosRow + `<div class="msdrop-noresults">Nenhum cliente encontrado para "${escapeHtml(query)}".</div>`;
  return todosRow + filtered.map(c=>`<div class="msdrop-opt cliente-opt ${c===state.cliente?'active':''}" data-val="${escapeHtml(c)}">${escapeHtml(c)}</div>`).join('');
}

function wireClienteDropdown(clientes){
  const dropdown = document.getElementById('cliente-dropdown');
  const btn = document.getElementById('cliente-btn');
  const panel = document.getElementById('cliente-panel');
  const search = document.getElementById('cliente-search');
  const optionsWrap = document.getElementById('cliente-options');
  if(!dropdown) return;
  if(state.clientePanelOpen) panel.classList.add('open');
  btn.addEventListener('click', e=>{
    e.stopPropagation();
    state.clientePanelOpen = !state.clientePanelOpen;
    panel.classList.toggle('open', state.clientePanelOpen);
    if(state.clientePanelOpen){ search.focus(); }
  });
  panel.addEventListener('click', e=> e.stopPropagation());
  search.addEventListener('input', ()=>{
    optionsWrap.innerHTML = renderClienteOptions(clientes, search.value);
    wireClienteOptions();
  });
  function wireClienteOptions(){
    optionsWrap.querySelectorAll('.cliente-opt').forEach(opt=>{
      opt.addEventListener('click', ()=>{
        state.cliente = opt.dataset.val;
        state.clientePanelOpen = true;
        render();
      });
    });
  }
  wireClienteOptions();
}

function render(){
  buildNav();
  buildFilterBar();
  const c = document.getElementById('content');
  Object.keys(charts).forEach(killChart);
  if(state.tab==='dashboard') c.innerHTML = renderDashboardShell();
  else if(state.tab==='geral') c.innerHTML = renderGeralShell();
  else if(state.tab==='anual') c.innerHTML = renderAnualShell();
  else if(state.tab==='cliente') c.innerHTML = renderClienteShell();
  else if(state.tab==='regiao') c.innerHTML = renderRegiaoShell();
  else if(state.tab==='diaria') c.innerHTML = renderDiariaShell();
  else if(state.tab==='metas') c.innerHTML = renderMetasShell();
  else if(state.tab==='bd') c.innerHTML = renderBDShell();

  requestAnimationFrame(()=>{
    if(state.tab==='dashboard') mountDashboard();
    else if(state.tab==='geral') mountGeral();
    else if(state.tab==='anual') mountAnual();
    else if(state.tab==='cliente') mountCliente();

    else if(state.tab==='bd') mountBD();
  });
}

async function mountDashboard(){
  const printBtn = document.getElementById('dash-print');

  const deltaClass = isFinite(g.varYTD) ? (g.varYTD>0.5?'up':g.varYTD<-0.5?'down':'flat') : 'flat';

  const anos = [...new Set(base.map(r=>r.an))].sort((a,b)=>a-b);

  killChart('chart-dash-anual');

  document.getElementById('dash-mensal-title').textContent = `Mensal — ${g.anoAtual} vs ${g.anoAnterior}`;
  const labels = MONTH_SHORT.slice(1);
  const dAtual = g.monthlyAtual.slice(1).map((v,i)=> (i+1<=g.lastMonth ? v : null));
  const dAnterior = g.monthlyAnterior.slice(1);
  killChart('chart-dash-mensal');
  charts['chart-dash-mensal'] = new Chart(document.getElementById('chart-dash-mensal'), {
    type:'line',
    data:{ labels, datasets:[
      {label:String(g.anoAnterior), data:dAnterior, borderColor: isDark()?'#3A434C':'#CFCBBD', backgroundColor:'transparent', borderWidth:2, pointRadius:0, tension:.3},
      {label:String(g.anoAtual), data:dAtual, borderColor:seriesColor(), backgroundColor:'transparent', borderWidth:2, pointRadius:0, tension:.3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmtNum(ctx.parsed.y)} L`}}},
      scales:{ y:{beginAtZero:true, grid:{color:gridColor()}, ticks:{color:tickColor(), font:{size:10}}},
               x:{grid:{display:false}, ticks:{color:tickColor(), font:{size:9}}} } }
  });

  const baseCli = baseFilter({cliente:false});
  const byClient = {}; baseCli.forEach(r=>{ byClient[r.n]=(byClient[r.n]||0)+r.q; });
  const topCli = Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCli = topCli.length ? topCli[0][1] : 1;

    <div class="dlist-row"><span class="dlist-name">${n}</span><span class="dlist-bar"><i style="width:${(v/maxCli*100).toFixed(0)}%"></i></span><span class="dlist-val">${fmtNum(v)} L</span></div>

  const baseReg = baseFilter({municipio:false});
  const byMun = {}; baseReg.forEach(r=>{ byMun[r.m]=(byMun[r.m]||0)+r.q; });
  const topReg = Object.entries(byMun).sort((a,b)=>b[1]-a[1]).slice(0,5);

  document.getElementById('dash-regioes').innerHTML = topReg.length ? topReg.map(([m,v])=>`

  } else {
    metaCard.style.display='none';
  }
}

function getCorteMes(base){
  const dRef = base.filter(r=>r.an===maxAno);
  if(dRef.length) return Math.max(...dRef.map(r=>r.me));
  return new Date().getMonth()+1;
}

function lastMonthInYear(base, year){
  const d = base.filter(r=>r.an===year);
  return d.length ? Math.max(...d.map(r=>r.me)) : 12;
}

function geralCompute(){
  const base = baseFilter({ano:false, mes:false});
  const anoAtual = state.ano!=='todos' ? Number(state.ano) : maxAno;
  const anoAnterior = anoAtual - 1;
  const dAtual = base.filter(r=>r.an===anoAtual);
  const dAnterior = base.filter(r=>r.an===anoAnterior);
  const lastMonth = dAtual.length ? Math.max(...dAtual.map(r=>r.me)) : 0;
  const ytdAtual = sum(dAtual.filter(r=>r.me<=lastMonth));
  const ytdAnterior = sum(dAnterior.filter(r=>r.me<=lastMonth));
  const varYTD = ytdAnterior>0 ? (ytdAtual/ytdAnterior-1)*100 : NaN;
  const totalAnteriorCompleto = sum(dAnterior);
  const clientesAtivos = new Set(dAtual.map(r=>r.n)).size;
  const monthlyAtual = Array(13).fill(0), monthlyAnterior = Array(13).fill(0);
  dAtual.forEach(r=> monthlyAtual[r.me]+=r.q);
  dAnterior.forEach(r=> monthlyAnterior[r.me]+=r.q);
  return {anoAtual, anoAnterior, lastMonth, ytdAtual, ytdAnterior, varYTD, totalAnteriorCompleto, clientesAtivos, monthlyAtual, monthlyAnterior};
}

function mountAnual(){
  const base = baseFilter({ano:false, mes:false, cliente:false});
  const anos = [...new Set(base.map(r=>r.an))].sort((a,b)=>a-b);
  const totals = anos.map(a=> sum(base.filter(r=>r.an===a)));
  const corteMes = getCorteMes(base);
  const ytd = anos.map(a=> sum(base.filter(r=>r.an===a && r.me<=corteMes)));

  document.getElementById('anual-sub').textContent =
    `Volume total por ano. A linha marca quanto cada ano já tinha somado até ${MONTH_FULL[corteMes]} — passe o mouse para ver o valor exato.`;

  killChart('chart-anual');
  charts['chart-anual'] = new Chart(document.getElementById('chart-anual'), {
    data:{ labels:anos, datasets:[
      {type:'bar', label:'Volume do ano', data:totals, backgroundColor:seriesColor(), borderRadius:4, maxBarThickness:48, order:2},
      {type:'line', label:`Acumulado até ${MONTH_SHORT[corteMes]}`, data:ytd, borderColor:accentColor(), backgroundColor:accentColor(),
       borderWidth:2, borderDash:[5,4], pointRadius:6, pointHoverRadius:8, pointBackgroundColor:accentColor(), fill:false, tension:0, order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label: ctx => `${ctx.dataset.label}: ${fmtNum(ctx.parsed.y)} L` } } },
      scales:{ y:{beginAtZero:true, grid:{color:gridColor()}, ticks:{color:tickColor()}},
               x:{grid:{display:false}, ticks:{color:tickColor()}} } }
  });
  document.getElementById('anual-legend').innerHTML = `
    <span><span class="sw" style="background:${seriesColor()}"></span>Volume do ano (completo ou até agora)</span>
    <span><span class="sw" style="background:${accentColor()}"></span>Acumulado até ${MONTH_SHORT[corteMes]} em cada ano</span>`;

  let rows = anos.map((a,i)=>{
    const prevYear = i>0 ? anos[i-1] : null;
    let varr = null;
    if(prevYear!=null){
      const mLimit = lastMonthInYear(base, a);
      const prevPeriodTotal = sum(base.filter(r=>r.an===prevYear && r.me<=mLimit));
      varr = prevPeriodTotal>0 ? (totals[i]/prevPeriodTotal-1)*100 : null;
    }
    const cls = varr==null?'flat':(varr>0.5?'up':varr<-0.5?'down':'flat');
    return `<tr><td>${a}</td><td class="num">${fmtNum(totals[i])} L</td><td class="num">${fmtNum(ytd[i])} L</td><td class="num">${varr==null?'—':`<span class="pill delta ${cls}">${fmtPct(varr)}</span>`}</td></tr>`;
  }).join('');
  document.getElementById('anual-table').innerHTML = totals.length ? `
    <p style="font-size:12px;color:var(--text-muted);margin:0 0 10px;">A "Var. YoY" compara sempre o mesmo número de meses nos dois anos (ex: se o ano da linha só tem dados até Junho, o ano anterior também é somado só até Junho) — assim um ano ainda incompleto não aparece artificialmente pior que um ano já fechado.</p>

  ` : `<div class="empty">Sem dados para os filtros atuais.</div>`;
}

function mountCliente(){
  if(state.cliente!=='todos'){ mountClienteDetail(); return; }
  const base = baseFilter({cliente:false});
  const byClient = {};
  base.forEach(r=>{ byClient[r.n] = (byClient[r.n]||0) + r.q; });
  const entries = Object.entries(byClient).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,e)=>s+e[1],0);
  if(!entries.length){
    document.getElementById('cliente-kpis').innerHTML = `<div class="empty">Sem dados para os filtros atuais.</div>`;
    document.getElementById('cliente-table').innerHTML='';
    return;
  }
  let acc=0;
  const withAbc = entries.map(([n,v])=>{ acc+=v; const cum=acc/total*100; const cls = cum<=80?'A':cum<=95?'B':'C'; return {n,v,cum,cls}; });
  const classCounts = {A:0,B:0,C:0}; withAbc.forEach(e=>classCounts[e.cls]++);
  document.getElementById('cliente-kpis').innerHTML = `
    <div class="kpi"><div class="lbl">Clientes no período</div><div class="val num">${entries.length}</div></div>
    <div class="kpi"><div class="lbl">Volume total</div><div class="val num">${fmtNum(total)} L</div></div>
    <div class="kpi"><div class="lbl">Classe A (80% do volume)</div><div class="val num">${classCounts.A}</div></div>
    <div class="kpi"><div class="lbl">Top cliente</div><div class="val num" style="font-size:15px;">${withAbc[0].n}</div></div>
  `;
  const top10 = withAbc.slice(0,10);
  killChart('chart-cliente');
  charts['chart-cliente'] = new Chart(document.getElementById('chart-cliente'), {
    data:{ labels: top10.map(e=>e.n.length>16? e.n.slice(0,15)+'…' : e.n),
      datasets:[
        {type:'bar', label:'Volume', data:top10.map(e=>e.v), backgroundColor:seriesColor(), borderRadius:4, yAxisID:'y'},
        {type:'line', label:'% acumulado', data:top10.map(e=>Math.round(e.cum)), borderColor:accentColor(), backgroundColor:'transparent', borderWidth:2, pointRadius:4, pointBackgroundColor:accentColor(), yAxisID:'y1'}
      ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},

               y1:{beginAtZero:true,max:100,position:'right', grid:{display:false}, ticks:{color:tickColor(), callback:v=>v+'%'}},
               x:{grid:{display:false}, ticks:{color:tickColor(), maxRotation:45, autoSkip:false, font:{size:10}}} } }
  });
  document.getElementById('cliente-table').innerHTML = `
    <table><thead><tr><th></th><th>Cliente</th><th class="num">Volume</th><th class="num">% do total</th><th class="num">% acum.</th></tr></thead>
    <tbody>${withAbc.map((e,i)=>`<tr><td><span class="rankbadge class${e.cls}">${e.cls}</span></td><td>${i+1}. ${e.n}</td><td class="num">${fmtNum(e.v)} L</td><td class="num">${(e.v/total*100).toFixed(1)}%</td><td class="num">${e.cum.toFixed(1)}%</td></tr>`).join('')}</tbody></table>`;
}

function mountClienteDetail(){
  const cli = state.cliente;
  const full = baseFilter({});
  const total = sum(full);

  const pool = baseFilter({cliente:false});
  const byClient = {};
  pool.forEach(r=>{ byClient[r.n] = (byClient[r.n]||0) + r.q; });
  const ranking = Object.entries(byClient).sort((a,b)=>b[1]-a[1]);
  const totalGeral = ranking.reduce((s,e)=>s+e[1],0);
  const idx = ranking.findIndex(([n])=>n===cli);
  const posicao = idx>=0 ? idx+1 : null;
  const participacao = totalGeral>0 ? (total/totalGeral*100) : 0;
  const mesesComCompra = new Set(full.map(r=>r.an+'-'+r.me)).size;

  if(!full.length){
    document.getElementById('clientedet-kpis').innerHTML = `<div class="empty">Sem dados de ${cli} para os filtros atuais.</div>`;
    document.getElementById('clientedet-table').innerHTML='';
    killChart('chart-clientedet');
    return;
  }

  document.getElementById('clientedet-kpis').innerHTML = `
    <div class="kpi"><div class="lbl">Volume no período</div><div class="val num">${fmtNum(total)} L</div></div>
    <div class="kpi"><div class="lbl">Posição no ranking</div><div class="val num">${posicao?('#'+posicao+' de '+ranking.length):'—'}</div></div>
    <div class="kpi"><div class="lbl">Participação no total</div><div class="val num">${participacao.toFixed(1)}%</div></div>
    <div class="kpi"><div class="lbl">Meses com compra</div><div class="val num">${mesesComCompra}</div></div>
  `;

  let labels, dataVals, title;
  if(state.ano!=='todos'){
    const anoSel = Number(state.ano);
    const arr = Array(13).fill(0);
    full.filter(r=>r.an===anoSel).forEach(r=> arr[r.me]+=r.q);
    labels = MONTH_SHORT.slice(1);
    dataVals = arr.slice(1);
    title = `Volume mensal de ${cli} em ${anoSel}`;
  } else {
    const anos = [...new Set(full.map(r=>r.an))].sort((a,b)=>a-b);
    labels = anos;
    dataVals = anos.map(a=> sum(full.filter(r=>r.an===a)));
    title = `Volume por ano — ${cli}`;
  }
  document.getElementById('clientedet-charttitle').textContent = title;
  killChart('chart-clientedet');
  charts['chart-clientedet'] = new Chart(document.getElementById('chart-clientedet'), {
    type:'bar',
    data:{ labels, datasets:[{label:'Volume', data:dataVals, backgroundColor:seriesColor(), borderRadius:4, maxBarThickness:44}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{ y:{beginAtZero:true, grid:{color:gridColor()}, ticks:{color:tickColor()}},
               x:{grid:{display:false}, ticks:{color:tickColor()}} } }
  });

  const cliBaseAllYears = baseFilter({ano:false});
  const yoyEl = document.getElementById('clientedet-yoy');
  if(state.ano!=='todos'){
    const anoSel = Number(state.ano);
    const anoAnt = anoSel - 1;
    const dAtual = cliBaseAllYears.filter(r=>r.an===anoSel);
    const totalAtual = sum(dAtual);
    const mLimit = dAtual.length ? Math.max(...dAtual.map(r=>r.me)) : 12;
    const totalAnt = sum(cliBaseAllYears.filter(r=>r.an===anoAnt && r.me<=mLimit));
    const varYoY = totalAnt>0 ? (totalAtual/totalAnt-1)*100 : null;
    const cls = varYoY==null?'flat':(varYoY>0.5?'up':varYoY<-0.5?'down':'flat');
    yoyEl.innerHTML = `
      <p style="font-size:12px;color:var(--text-muted);margin:0 0 12px;">Compara sempre o mesmo intervalo de meses nos dois anos (se ${anoSel} só tem dados até ${MONTH_SHORT[mLimit]}, ${anoAnt} também é somado só até ${MONTH_SHORT[mLimit]}).</p>
      <div class="kpi-row" style="margin-bottom:0;">
        <div class="kpi"><div class="lbl">${anoSel} (até ${MONTH_SHORT[mLimit]})</div><div class="val num">${fmtNum(totalAtual)} L</div></div>
        <div class="kpi"><div class="lbl">${anoAnt} (mesmo período)</div><div class="val num">${fmtNum(totalAnt)} L</div></div>
        <div class="kpi"><div class="lbl">Variação</div><div class="val num">${varYoY==null?'—':`<span class="pill delta ${cls}">${fmtPct(varYoY)}</span>`}</div></div>
      </div>`;
  } else {
    const anos = [...new Set(cliBaseAllYears.map(r=>r.an))].sort((a,b)=>a-b);
    const rows = anos.map((a,i)=>{
      const totalAno = sum(cliBaseAllYears.filter(r=>r.an===a));
      const prevYear = i>0 ? anos[i-1] : null;
      let varr = null;
      if(prevYear!=null){
        const mLimit = lastMonthInYear(cliBaseAllYears, a);
        const prevPeriodTotal = sum(cliBaseAllYears.filter(r=>r.an===prevYear && r.me<=mLimit));
        varr = prevPeriodTotal>0 ? (totalAno/prevPeriodTotal-1)*100 : null;
      }
      const cls = varr==null?'flat':(varr>0.5?'up':varr<-0.5?'down':'flat');
      return `<tr><td>${a}</td><td class="num">${fmtNum(totalAno)} L</td><td class="num">${varr==null?'—':`<span class="pill delta ${cls}">${fmtPct(varr)}</span>`}</td></tr>`;
    }).join('');
    yoyEl.innerHTML = `
      <p style="font-size:12px;color:var(--text-muted);margin:0 0 12px;">A variação compara sempre o mesmo número de meses nos dois anos.</p>
      <table><thead><tr><th>Ano</th><th class="num">Volume</th><th class="num">Var. vs ano anterior</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  const byMun = {};
  full.forEach(r=>{ byMun[r.m] = (byMun[r.m]||0) + r.q; });
  const munEntries = Object.entries(byMun).sort((a,b)=>b[1]-a[1]);
  document.getElementById('clientedet-table').innerHTML = `
    <table><thead><tr><th>Município</th><th class="num">Volume</th><th class="num">% do cliente</th></tr></thead>
    <tbody>${munEntries.map(([m,v])=>`<tr><td>${m}</td><td class="num">${fmtNum(v)} L</td><td class="num">${(v/total*100).toFixed(1)}%</td></tr>`).join('')}</tbody></table>`;
}

function mountDiaria(){
  const base = baseFilter({ano:false, mes:false, municipio:false, cliente:false});
  const anoAlvo = state.ano!=='todos' ? Number(state.ano) : maxAno;
  const dAno = base.filter(r=>r.an===anoAlvo);
  const mesAlvo = diariaMesAlvo(dAno);
  if(!mesAlvo){
    document.getElementById('diaria-kpis').innerHTML = `<div class="empty">Sem dados para ${anoAlvo} com os filtros atuais.</div>`;
    return;
  }
  const dMes = dAno.filter(r=>r.me===mesAlvo);
  const byDay = {};
  dMes.forEach(r=>{ byDay[r.d] = (byDay[r.d]||0) + r.q; });
  const days = Object.keys(byDay).sort();
  const vals = days.map(d=>byDay[d]);
  const total = vals.reduce((a,b)=>a+b,0);
  let acc=0; const cum = vals.map(v=>{acc+=v; return acc;});
  document.getElementById('diaria-kpis').innerHTML = `

const hasClaudeStorage = (typeof window!=='undefined') && !!window.storage && typeof window.storage.get==='function';
async function storageGet(key){
  if(hasClaudeStorage){
    try{ const r = await window.storage.get(key); return r ? r.value : null; }catch(e){ return null; }
  }
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
async function storageSet(key, value){
  if(hasClaudeStorage){
    try{ await window.storage.set(key, value); return true; }catch(e){ return false; }
  }
  try{ localStorage.setItem(key, value); return true; }catch(e){ return false; }
}

async function loadMeta(key){
  const v = await storageGet(key);
  return v ? Number(v) : 0;
}
async function saveMeta(key, val){
  return await storageSet(key, String(val));
}

async function mountMetas(){
  const anoAlvo = state.ano!=='todos' ? Number(state.ano) : maxAno;
  const key = `meta:${anoAlvo}:${state.area}`;
  const input = document.getElementById('meta-input');
  const savedTag = document.getElementById('meta-saved');
  let annualGoal = await loadMeta(key);
  input.value = annualGoal || '';

  document.getElementById('meta-save').addEventListener('click', async ()=>{
    const v = Number(input.value)||0;
    const ok = await saveMeta(key, v);
    if(ok){ savedTag.classList.add('show'); setTimeout(()=>savedTag.classList.remove('show'), 1800); }
    drawMetas(v, document.getElementById('meta-saz').checked);
  });
  document.getElementById('meta-saz').addEventListener('change', (e)=>{
    drawMetas(Number(input.value)||0, e.target.checked);
  });

  drawMetas(annualGoal, true);

  function drawMetas(annualGoal, useSeasonality){
    const base = baseFilter({ano:false, mes:false, municipio:false, cliente:false});

    const histYears = [...new Set(base.map(r=>r.an))].filter(a=>a!==anoAlvo);
    const monthSums = Array(13).fill(0), monthCounts = Array(13).fill(0);
    histYears.forEach(y=>{
      for(let m=1;m<=12;m++){
        const v = sum(base.filter(r=>r.an===y && r.me===m));
        if(v>0){ monthSums[m]+=v; monthCounts[m]+=1; }
      }
    });
    const monthAvg = [];
    for(let m=1;m<=12;m++) monthAvg[m] = monthCounts[m] ? monthSums[m]/monthCounts[m] : 0;
    const avgAll = monthAvg.slice(1).reduce((a,b)=>a+b,0)/12 || 1;
    const seasIdx = []; for(let m=1;m<=12;m++) seasIdx[m] = avgAll>0 ? monthAvg[m]/avgAll : 1;
    const seasIdxSum = seasIdx.slice(1).reduce((a,b)=>a+b,0) || 12;

    const goalMonth = [];
    for(let m=1;m<=12;m++){
      goalMonth[m] = useSeasonality ? annualGoal * (seasIdx[m]/seasIdxSum) : annualGoal/12;
    }

    const dAno = base.filter(r=>r.an===anoAlvo);
    const realizedMonth = Array(13).fill(0);
    dAno.forEach(r=> realizedMonth[r.me]+=r.q);
    const lastMonth = dAno.length ? Math.max(...dAno.map(r=>r.me)) : 0;
    const mesCorrente = lastMonth + 1;

    const anoAnt = anoAlvo - 1;
    const dAnoAnt = base.filter(r=>r.an===anoAnt);
    const realizedMonthAnt = Array(13).fill(0);
    dAnoAnt.forEach(r=> realizedMonthAnt[r.me]+=r.q);

    const totalAnoAnt = realizedMonthAnt.slice(1,13).reduce((a,b)=>a+b,0);
    const totalAteAnteriorAnoAnt = realizedMonthAnt.slice(1,lastMonth+1).reduce((a,b)=>a+b,0);
    const soMesAtualAnoAnt = (mesCorrente<=12) ? realizedMonthAnt[mesCorrente] : null;
    document.getElementById('metas-anoant-ref').innerHTML = `
      <div class="infoitem"><div class="k">Realizado ${anoAnt} — total do ano</div><div class="v">${fmtNum(totalAnoAnt)} L</div></div>
      <div class="infoitem"><div class="k">Realizado ${anoAnt} — até ${lastMonth?MONTH_SHORT[lastMonth]:'—'}</div><div class="v">${fmtNum(totalAteAnteriorAnoAnt)} L</div></div>
      <div class="infoitem"><div class="k">Realizado ${anoAnt} — só ${mesCorrente<=12?MONTH_SHORT[mesCorrente]:'—'}</div><div class="v">${soMesAtualAnoAnt==null?'—':fmtNum(soMesAtualAnoAnt)+' L'}</div></div>
    `;

    const realizadoAcum = realizedMonth.slice(1,lastMonth+1).reduce((a,b)=>a+b,0);
    const metaAcumFechada = goalMonth.slice(1,lastMonth+1).reduce((a,b)=>a+b,0);
    const pctAtingido = metaAcumFechada>0 ? (realizadoAcum/metaAcumFechada*100) : NaN;
    const metaMesCorrente = (mesCorrente<=12) ? goalMonth[mesCorrente] : null;

    // Saldo acumulado desde Janeiro (Realizado - Meta): negativo = atrasado, positivo = adiantado.
    // A diferença é repassada para a meta do mês atual: atrasado soma, adiantado desconta.
    const saldo = lastMonth>0 ? (realizadoAcum - metaAcumFechada) : 0;
    const metaAjustadaMesAtual = (mesCorrente<=12 && lastMonth>0) ? Math.max(0, goalMonth[mesCorrente] - saldo) : metaMesCorrente;

    const kpiCls = pctAtingido>=100?'up': pctAtingido>=90?'flat':'down';
    const saldoCls = saldo>0?'up':saldo<0?'down':'flat';
    document.getElementById('metas-kpis').innerHTML = annualGoal>0 ? `
      <div class="kpi"><div class="lbl">Meta anual</div><div class="val num">${fmtNum(annualGoal)} L</div></div>
      <div class="kpi"><div class="lbl">Realizado até ${lastMonth?MONTH_SHORT[lastMonth]:'—'}</div><div class="val num">${fmtNum(realizadoAcum)} L</div></div>
      <div class="kpi"><div class="lbl">Meta acumulada até ${lastMonth?MONTH_SHORT[lastMonth]:'—'}</div><div class="val num">${fmtNum(metaAcumFechada)} L</div><span class="delta ${kpiCls}">${isFinite(pctAtingido)?pctAtingido.toFixed(0)+'% atingido':'—'}</span></div>
      <div class="kpi"><div class="lbl">Meta ajustada p/ ${mesCorrente<=12?MONTH_SHORT[mesCorrente]:'—'}</div><div class="val num">${metaAjustadaMesAtual==null?'Ano completo':fmtNum(metaAjustadaMesAtual)+' L'}</div>${lastMonth>0?`<span class="delta ${saldoCls}">saldo ${saldo>=0?'+':''}${fmtNum(saldo)} L</span>`:''}</div>
    ` : `<div class="empty">Informe o objetivo anual acima para calcular as metas mensais.</div>`;

    killChart('chart-metas');
    charts['chart-metas'] = new Chart(document.getElementById('chart-metas'), {
      type:'bar',
      data:{ labels: MONTH_SHORT.slice(1), datasets:[
        {label:'Meta', data: goalMonth.slice(1).map((v,i)=> (i+1===mesCorrente && lastMonth>0) ? Math.round(metaAjustadaMesAtual) : Math.round(v)), backgroundColor: isDark()?'#3A434C':'#CFCBBD', borderRadius:4, maxBarThickness:26},
        {label:'Realizado', data: realizedMonth.slice(1,13).map((v,i)=> (i+1<=lastMonth ? v : null)), backgroundColor: seriesColor(), borderRadius:4, maxBarThickness:26}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{ y:{beginAtZero:true, grid:{color:gridColor()}, ticks:{color:tickColor()}},
                 x:{grid:{display:false}, ticks:{color:tickColor()}} } }
    });

    const rows = [];
    const scale = Math.max(1, ...goalMonth.slice(1), ...realizedMonth.slice(1,13), metaAjustadaMesAtual||0);
    for(let m=1;m<=12;m++){
      if(m===mesCorrente && lastMonth>0){
        rows.push(`<div class="metas-checkpoint">
          <div class="metas-checkpoint-title">Totais desde Janeiro (até ${MONTH_SHORT[lastMonth]})</div>
          <div class="metas-checkpoint-row">
            <span class="metas-checkpoint-item">Meta acumulada <strong class="num">${fmtNum(metaAcumFechada)} L</strong></span>
            <span class="metas-checkpoint-item">Realizado acumulado <strong class="num">${fmtNum(realizadoAcum)} L</strong></span>
            <span class="metas-checkpoint-item">Saldo <span class="pill delta ${saldoCls}">${saldo>=0?'+':''}${fmtNum(saldo)} L</span></span>
          </div>
          <div class="metas-checkpoint-note">${saldo<0 ? `Ficou ${fmtNum(Math.abs(saldo))} L abaixo da meta acumulada — valor somado ao objetivo de ${MONTH_SHORT[mesCorrente]}.` : saldo>0 ? `Ficou ${fmtNum(saldo)} L acima da meta acumulada — valor descontado do objetivo de ${MONTH_SHORT[mesCorrente]}.` : `Exatamente em linha com a meta acumulada.`}</div>
        </div>`);
      }

      const r = m<=lastMonth ? realizedMonth[m] : null;
      const isCurrentMonth = (m===mesCorrente && lastMonth>0);
      const meta = isCurrentMonth ? metaAjustadaMesAtual : goalMonth[m];
      const pctMes = (r!=null && meta>0) ? (r/meta*100) : null;
      const clsBar = pctMes==null ? '' : (pctMes>=100?'good':pctMes>=80?'':'bad');
      const clsBadge = pctMes==null?'flat':(pctMes>=100?'up':pctMes>=80?'flat':'down');

      const realAcum = realizedMonth.slice(1,m+1).reduce((a,b)=>a+b,0);
      const prevAcum = realizedMonthAnt.slice(1,m+1).reduce((a,b)=>a+b,0);
      const varAno = (r!=null && prevAcum>0) ? (realAcum/prevAcum-1)*100 : null;
      const clsAno = varAno==null?'flat':(varAno>=0?'up':'down');

      const rowState = m===mesCorrente ? 'current' : (r==null ? 'future' : '');
      const fillPct = r==null ? 0 : Math.min(100, (r/scale)*100);
      const targetPct = Math.min(100, (meta/scale)*100);

      rows.push(`<div class="metas-row ${rowState}">
        <div class="metas-month">${MONTH_SHORT[m]}</div>
        <div class="metas-bar-wrap">
          <div class="metas-bar-track"></div>
          <div class="metas-bar-fill ${clsBar}" style="width:${fillPct.toFixed(1)}%"></div>
          <div class="metas-bar-target" style="left:${targetPct.toFixed(1)}%"></div>
        </div>
        <div class="metas-values">
          <div class="metas-values-main">${r==null?'—':fmtNum(r)} <span class="sep">/</span> ${fmtNum(meta)} L${isCurrentMonth?' <span class="adj-tag">ajustada</span>':''}</div>
          <div class="metas-values-sub">
            ${pctMes==null?'':`<span class="pill delta ${clsBadge}" style="font-size:10.5px;padding:1px 7px;">${pctMes.toFixed(0)}%</span>`}
            ${varAno==null?'':`<span class="pill delta ${clsAno}" style="font-size:10.5px;padding:1px 7px;">${anoAnt}: ${fmtPct(varAno)}</span>`}
          </div>
        </div>
      </div>`);
    }
    document.getElementById('metas-table').innerHTML = annualGoal>0 ? `
      <div class="metas-legend">
        <span><i></i> traço = meta do mês</span>
        <span><i class="sw" style="background:var(--good);"></i> meta atingida</span>
        <span><i class="sw" style="background:var(--bad);"></i> abaixo da meta</span>
        <span>% acumulado no ano vs ${anoAnt} ao lado de cada mês</span>
      </div>
      <div class="metas-list">${rows.join('')}</div>
    ` : `<div class="empty">Informe o objetivo anual acima para ver o comparativo mês a mês.</div>`;
  }
}

function normalizeHeader(h){
  return h.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_');
}
function parseNumberPt(s){
  if(s==null) return NaN;
  s = String(s).trim();
  if(s==='') return NaN;
  if(s.indexOf(',')>-1 && s.indexOf('.')>-1) s = s.replace(/\./g,'').replace(',', '.');
  else if(s.indexOf(',')>-1) s = s.replace(',', '.');
  return Number(s);
}
function parseDateFlexible(s){
  if(!s) return null;
  s = String(s).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  return null;
}
function parsePastedTSV(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim()!=='');
  if(lines.length<2) throw new Error('Cole o cabeçalho e pelo menos uma linha de dados.');
  const headers = lines[0].split('\t').map(normalizeHeader);
  const idx = {}; headers.forEach((h,i)=>{ idx[h]=i; });
  const colNome = idx['nome'], colMun = idx['municipio'], colArea = idx['area'], colQuarto = idx['quarto'],
        colDia = idx['dia'], colAno = idx['ano'], colMes = idx['mes_num'];
  const found = headers.filter(h=>h).join(', ') || '(nenhuma — confira se a linha colada tem tabulações entre as colunas)';
  if(colNome===undefined || colMun===undefined || colQuarto===undefined)
    throw new Error(`Faltam colunas obrigatórias (Nome, Municipio ou Quarto). Cabeçalho que eu li: ${found}.`);
  if(colDia===undefined && (colAno===undefined || colMes===undefined))
    throw new Error(`Preciso da coluna Dia, ou de Ano + Mês_Num, pra saber o período. Cabeçalho que eu li: ${found}.`);
  const out = [];
  let skippedNomeOuMun=0, skippedQuarto=0, skippedPeriodo=0;
  for(let i=1;i<lines.length;i++){
    const cells = lines[i].split('\t');
    const n = (cells[colNome]||'').replace(/\u00a0/g,' ').trim();
    const m = (cells[colMun]||'').replace(/\u00a0/g,' ').trim();
    if(!n || !m){ skippedNomeOuMun++; continue; }
    const q = parseNumberPt(cells[colQuarto]);
    if(!isFinite(q)){ skippedQuarto++; continue; }
    const a = colArea!==undefined ? parseInt(cells[colArea],10) : Number(state.area==='todas'?220:state.area);
    let d = colDia!==undefined ? parseDateFlexible(cells[colDia]) : null;
    let an = colAno!==undefined ? parseInt(cells[colAno],10) : null;
    let me = colMes!==undefined ? parseInt(cells[colMes],10) : null;
    if(d && (!an || !me)){ const [yy,mm] = d.split('-'); an = an || Number(yy); me = me || Number(mm); }
    if(!d && an && me) d = `${an}-${String(me).padStart(2,'0')}-01`;
    if(!an || !me || !d){ skippedPeriodo++; continue; }
    out.push({n, m, a: isFinite(a)?a:220, an, me, d, q});
  }
  if(!out.length){
    const motivos = [];
    if(skippedNomeOuMun) motivos.push(`${skippedNomeOuMun} sem nome/município`);
    if(skippedQuarto) motivos.push(`${skippedQuarto} com Quarto inválido`);
    if(skippedPeriodo) motivos.push(`${skippedPeriodo} sem data/ano/mês reconhecidos (confira o formato da coluna Dia)`);
    throw new Error(`Nenhuma linha válida encontrada. Cabeçalho lido: ${found}.${motivos.length? ' Linhas descartadas: '+motivos.join('; ')+'.' : ''}`);
  }
  return out;
}
async function importRecords(newRecords){
  const keyOf = r => r.n+'|'+r.an+'|'+r.me;
  const map = new Map();
  RAW.forEach(r=> map.set(keyOf(r), r));
  let inserted=0, updated=0;
  newRecords.forEach(r=>{ const k=keyOf(r); if(map.has(k)) updated++; else inserted++; map.set(k, r); });
  RAW = Array.from(map.values());
  recomputeMaxAno();
  await persistRAW();
  return {inserted, updated, total: RAW.length};
}
async function exportBackup(){
  const filename = 'painel_comercial_backup_' + new Date().toISOString().slice(0,10) + '.json';
  const json = JSON.stringify(RAW);
  try{
    const file = new File([json], filename, {type:'application/json'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'Backup Check Litragem'});
      return;
    }
  }catch(e){ }
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function mountBD(){
  const btn = document.getElementById('import-btn');
  if(!btn) return;
  const textArea = document.getElementById('import-text');
  const preview = document.getElementById('import-preview');
  textArea.addEventListener('input', ()=>{
    const text = textArea.value;
    if(!text.trim()){ preview.textContent=''; return; }
    try{
      const recs = parsePastedTSV(text);
      preview.style.color = 'var(--text-2)';
      const meses = [...new Set(recs.map(r=>`${MONTH_SHORT[r.me]}/${r.an}`))].join(', ');
      preview.textContent = `Pronto pra importar: ${recs.length} linha(s) válida(s) — período detectado: ${meses}.`;
    }catch(err){
      preview.style.color = 'var(--bad-ink)';
      preview.textContent = err.message;
    }
  });
  btn.addEventListener('click', async ()=>{
    const text = document.getElementById('import-text').value;
    const fb = document.getElementById('import-feedback');
    try{
      const recs = parsePastedTSV(text);
      const res = await importRecords(recs);
      fb.style.color = 'var(--good-ink)';
      fb.textContent = `${res.inserted} registro(s) novo(s), ${res.updated} atualizado(s). Total na base: ${res.total}. Atualizando o painel…`;
      preview.textContent='';
      document.getElementById('import-text').value='';
      setTimeout(render, 1600);
    }catch(err){
      fb.style.color = 'var(--bad-ink)';
      fb.textContent = err.message;
    }
  });
  document.getElementById('export-btn').addEventListener('click', exportBackup);
  document.getElementById('import-file-btn').addEventListener('click', ()=>{
    document.getElementById('import-file-input').click();
  });
  document.getElementById('import-file-input').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    const fb = document.getElementById('import-file-feedback');
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (ev)=>{
      const raw = ev.target.result;
      let parsed;
      try{
        parsed = JSON.parse(raw);
      }catch(e){
        fb.style.color = 'var(--bad-ink)';
        fb.textContent = `Não consegui ler como JSON. Início do arquivo: "${String(raw).slice(0,60)}…" — parece que o arquivo não foi salvo corretamente.`;
        return;
      }
      try{
        if(!Array.isArray(parsed) || !parsed.length){
          const tipo = Array.isArray(parsed) ? 'uma lista vazia' : typeof parsed;
          throw new Error(`O arquivo não é uma lista de registros (encontrei ${tipo}). Use o .json baixado pelo botão "Baixar backup" deste painel, sem abrir ou editar antes.`);
        }
        const bad = parsed.find(r=> typeof r.n!=='string' || typeof r.m!=='string' || typeof r.q!=='number' || !r.an || !r.me);
        if(bad) throw new Error('O arquivo tem registros em formato inesperado — use um backup baixado deste mesmo painel.');
        const res = await importRecords(parsed);
        fb.style.color = 'var(--good-ink)';
        fb.textContent = `Backup carregado: ${res.inserted} novo(s), ${res.updated} atualizado(s). Total na base: ${res.total}. Atualizando…`;
        setTimeout(render, 1600);
      }catch(err){
        fb.style.color = 'var(--bad-ink)';
        fb.textContent = err.message;
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
  document.getElementById('reset-btn').addEventListener('click', async ()=>{
    if(confirm('Isso remove os dados importados e volta para a base original carregada na criação do painel. Continuar?')){
      await resetToSeed();
      render();
    }
  });
}

function heroStats(data){
  const d220 = data.filter(r=>r.a===220);
  const pool = d220.length ? d220 : data;
  const ano = Math.max(...pool.map(r=>r.an));
  const dAno = pool.filter(r=>r.an===ano);
  return {
    ano,
    volume: sum(dAno),
    clientes: new Set(dAno.map(r=>r.n)).size,
    municipios: new Set(dAno.map(r=>r.m)).size
  };
}
function renderLandingStats(data){
  const h = heroStats(data);
  const items = [
    {iconName:'package', val:fmtNum(h.volume)+' L', lbl:`Volume vendido em ${h.ano}`},
    {iconName:'users', val:h.clientes, lbl:'Clientes ativos'},
    {iconName:'mapPin', val:h.municipios, lbl:'Municípios atendidos'}
  ];
  document.getElementById('landing-stats').innerHTML = items.map((it,i)=>`
    <div class="landing-stat-card" style="animation-delay:${(0.18+i*0.09).toFixed(2)}s">
      <div class="landing-stat-icon">${icon(it.iconName)}</div>
      <div class="landing-stat-val num">${it.val}</div>
      <div class="landing-stat-lbl">${it.lbl}</div>
    </div>
  `).join('');
}
function showLanding(){
  document.getElementById('shell').style.display='none';
  document.getElementById('landing').style.display='flex';
}
function showApp(){
  document.getElementById('landing').style.display='none';
  document.getElementById('shell').style.display='block';
}

function openDrawer(){ document.getElementById('drawer').classList.add('open'); document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }
document.getElementById('hamburger-btn').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

const filterbarToggleBtn = document.getElementById('filterbar-toggle');
const filterbarPanelEl = document.getElementById('filterbar-panel');
filterbarToggleBtn.addEventListener('click', ()=>{
  const willOpen = !filterbarPanelEl.classList.contains('open');
  if(willOpen){
    filterbarPanelEl.style.overflow = 'hidden';
    filterbarPanelEl.classList.add('open');
    const onOpenEnd = (e)=>{
      if(e.target===filterbarPanelEl && e.propertyName==='max-height'){
        filterbarPanelEl.style.overflow = 'visible';
        filterbarPanelEl.removeEventListener('transitionend', onOpenEnd);
      }
    };
    filterbarPanelEl.addEventListener('transitionend', onOpenEnd);
  } else {
    filterbarPanelEl.style.overflow = 'hidden';
    filterbarPanelEl.classList.remove('open');
  }
  filterbarToggleBtn.classList.toggle('open', willOpen);
  filterbarToggleBtn.setAttribute('aria-expanded', String(willOpen));
  filterbarToggleBtn.setAttribute('aria-label', willOpen ? 'Ocultar filtros' : 'Mostrar filtros');
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDrawer(); });
document.addEventListener('click', e=>{
  const dropdown = document.getElementById('mes-dropdown');
  if(dropdown && !dropdown.contains(e.target) && state.mesPanelOpen){
    state.mesPanelOpen = false;
    const panel = document.getElementById('mes-panel');
    if(panel) panel.classList.remove('open');
  }
  const cliDropdown = document.getElementById('cliente-dropdown');
  if(cliDropdown && !cliDropdown.contains(e.target) && state.clientePanelOpen){
    state.clientePanelOpen = false;
    const cliPanel = document.getElementById('cliente-panel');
    if(cliPanel) cliPanel.classList.remove('open');
  }
});

renderLandingStats(SEED);

const dataReady = (async ()=>{
  const stored = await loadRAWFromStorage();
  if(stored){ RAW = stored; } else { await persistRAW(); }
  recomputeMaxAno();
  state.ano = String(maxAno);
  renderLandingStats(RAW);
})();

document.getElementById('cta-btn').addEventListener('click', async ()=>{
  await dataReady;
  showApp();
  render();
});
</script>
